<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 bg-white shadow-lg">
        
        <header class="py-4 border-b border-slate-100 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-slate-950">
                <i class="fa-solid fa-chart-line text-indigo-600 mr-1"></i> Happy 평촌
            </h1>
            <span id="current-date" class="text-sm text-slate-500 font-medium bg-slate-100 px-2.5 py-1 rounded-full">로딩 중...</span>
        </header>

        <div class="mt-4 border-b border-slate-200 pb-3">
            <div id="tabs-container" class="flex flex-wrap gap-2">
                <span class="text-sm text-slate-400 px-3 py-1">탭 로딩 중...</span>
            </div>
        </div>

        <main class="flex-1 flex flex-col justify-center space-y-4 my-4">
            
            <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-2xl p-6 shadow-md">
                <p id="asset-label" class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">현재 금액</p>
                <div class="flex items-baseline justify-between mb-4">
                    <span id="total-amount" class="text-3xl font-extrabold tracking-tight">0</span>
                    <span class="text-sm text-slate-400 font-medium">KRW</span>
                </div>
                
                <div class="pt-3 border-t border-slate-700/50 flex items-center justify-between">
                    <span class="text-xs text-slate-400 font-medium">전일 대비 변동</span>
                    <div class="flex items-center space-x-1.5">
                        <span id="prev-day-change" class="text-sm font-bold">-</span>
                        <span id="prev-day-icon" class="text-xs"></span>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex items-center justify-between">
                <div>
                    <p id="base-day-label" class="text-xs font-medium text-slate-500 mb-0.5">기준일 대비 총 증감</p>
                    <span id="base-day-change" class="text-xl font-bold">-</span>
                </div>
                <div id="base-day-badge" class="w-10 h-10 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-minus"></i>
                </div>
            </div>

            <div id="finance-links-box" class="hidden grid grid-cols-2 gap-2 transition-all duration-200">
                <a id="naver-finance-link" href="#" target="_blank" class="bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 rounded-xl py-2.5 px-3 flex items-center justify-between font-semibold text-xs shadow-sm transition-colors">
                    <span><i class="fa-solid fa-money-bill-trend-up mr-1 text-emerald-600"></i>네이버증권</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-emerald-500"></i>
                </a>
                <a id="google-finance-link" href="#" target="_blank" class="bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 rounded-xl py-2.5 px-3 flex items-center justify-between font-semibold text-xs shadow-sm transition-colors">
                    <span><i class="fa-solid fa-arrow-up-right-from-square mr-1 text-blue-600"></i>구글금융</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-blue-500"></i>
                </a>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                <p class="text-xs font-semibold text-slate-500 mb-3"><i class="fa-solid fa-trend-up mr-1"></i> 자산 추이</p>
                <div class="relative w-full h-52">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

        </main>

        <footer class="py-4 text-center border-t border-slate-100 text-xs text-slate-400">
            © 2026  매일 업데이트.
        </footer>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?gid=1226081751&single=true&output=csv";

        // 💡 알려주신 정확한 종목명 정보와 금융 코드를 100% 일치시켰습니다.
        const naverCodeMap = {
            "TIGER 200 IT": "139260",
            "ACE 미국빅테크TOP7 Plus": "465580",
            "KODEX IT": "266370",
            "KODEX AI전력핵심설비": "487240",
            "KIWOOM 미국양자컴퓨팅": "498270"
        };

        let sheetHeaders = [];       
        let dateLabels = [];     
        let ColumnDataMaps = {}; 
        let chartInstance = null; 

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(sheetUrl);
                if (!response.ok) throw new Error("네트워크 응답 불량");
                const csvText = await response.text();
                
                const lines = csvText.split(/\r?\n/);
                if (lines.length < 2) return;

                sheetHeaders = parseCSVLine(lines[0]);
                
                for (let j = 1; j < sheetHeaders.length; j++) {
                    ColumnDataMaps[j] = [];
                }
                dateLabels = [];

                for (let i = 1; i < lines.length; i++) {
                    const rowText = lines[i].trim();
                    if (!rowText) continue;
                    
                    const columns = parseCSVLine(rowText);
                    if (!columns[0]) continue; 

                    dateLabels.push(columns[0]);

                    for (let j = 1; j < sheetHeaders.length; j++) {
                        let val = null;
                        if (columns[j] !== undefined && columns[j] !== null && columns[j].trim() !== "") {
                            const num = parseFloat(columns[j].replace(/[^0-9.-]/g, ""));
                            if (!isNaN(num)) val = num;
                        }
                        ColumnDataMaps[j].push(val);
                    }
                }

                renderTabs();
                switchTab(1); 

            } catch (error) {
                console.error("데이터 로딩 실패:", error);
                document.getElementById('current-date').innerText = "오류 발생";
            }
        }

        function parseCSVLine(text) {
            const result = [];
            const regex = /(?!\s|$)\s*(?:"([^"\\]*(?:\\[\s\S][^"\\]*)*)"|([^",\s\t\n\r]*))\s*(?:,|$)/g;
            
            let match;
            while ((match = regex.exec(text)) !== null) {
                let matchStr = match[1] !== undefined ? match[1] : match[2];
                result.push(matchStr ? matchStr.trim() : "");
                if (regex.lastIndex === match.index) {
                    regex.lastIndex++;
                }
            }
            return result;
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = "";

            for (let j = 1; j < sheetHeaders.length; j++) {
                if (!sheetHeaders[j]) continue;
                
                const btn = document.createElement('button');
                btn.id = `tab-btn-${j}`;
                btn.type = "button";
                btn.className = "text-xs font-medium px-3 py-1.5 rounded-full whitespace-nowrap transition-all duration-150";
                btn.innerText = sheetHeaders[j];
                btn.addEventListener('click', () => switchTab(j));
                
                container.appendChild(btn);
            }
        }

        function switchTab(index) {
            const currentTabName = sheetHeaders[index] ? sheetHeaders[index].trim() : "";

            for (let j = 1; j < sheetHeaders.length; j++) {
                const btn = document.getElementById(`tab-btn-${j}`);
                if (!btn) continue;
                if (j === index) {
                    btn.className = "text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-indigo-600 text-white shadow-sm";
                } else {
                    btn.className = "text-xs font-medium px-3 py-1.5 rounded-full whitespace-nowrap bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }

            document.getElementById('asset-label').innerText = `${currentTabName} 현황`;
            document.getElementById('current-date').innerText = dateLabels[dateLabels.length - 1];

            // 네이버 금융 및 구글 금융 정보 매칭 로직 수정
            const linksBox = document.getElementById('finance-links-box');
            const naverLink = document.getElementById('naver-finance-link');
            const googleLink = document.getElementById('google-finance-link');
            const targetCode = naverCodeMap[currentTabName];
            
            if (targetCode) {
                naverLink.href = `https://finance.naver.com/item/main.naver?code=${targetCode}`;
                googleLink.href = `https://www.google.com/finance/beta/quote/${targetCode}:KRX`;
                linksBox.classList.remove('hidden');
            } else {
                linksBox.classList.add('hidden');
            }

            const currentArray = ColumnDataMaps[index];
            
            let firstValidIdx = -1;
            for (let k = 0; k < currentArray.length; k++) {
                if (currentArray[k] !== null && !isNaN(currentArray[k])) {
                    firstValidIdx = k;
                    break;
                }
            }

            if (firstValidIdx === -1) {
                document.getElementById('total-amount').innerText = "0";
                document.getElementById('base-day-label').innerText = "기준일 데이터 없음";
                document.getElementById('base-day-change').innerText = "-";
                if (chartInstance) chartInstance.destroy();
                return;
            }

            const latestVal = currentArray[currentArray.length - 1] || 0;
            
            let prevVal = latestVal;
            for (let k = currentArray.length - 2; k >= firstValidIdx; k--) {
                if (currentArray[k] !== null && !isNaN(currentArray[k])) {
                    prevVal = currentArray[k];
                    break;
                }
            }
            
            const baseVal = currentArray[firstValidIdx];
            const startActiveDate = dateLabels[firstValidIdx]; 

            document.getElementById('total-amount').innerText = latestVal.toLocaleString();

            const prevDiff = latestVal - prevVal;
            const prevPercent = prevVal !== 0 ? (prevDiff / prevVal) * 100 : 0;
            updatePrevDayUI(prevDiff, prevPercent);

            document.getElementById('base-day-label').innerText = `기준일(${startActiveDate}) 대비 총 증감`;
            const baseDiff = latestVal - baseVal;
            const basePercent = baseVal !== 0 ? (baseDiff / baseVal) * 100 : 0;
            updateBaseDayCard(baseDiff, basePercent);

            renderChart(index, firstValidIdx);
        }

        function updatePrevDayUI(diff, percent) {
            const textEl = document.getElementById('prev-day-change');
            const iconEl = document.getElementById('prev-day-icon');
            const sign = diff > 0 ? '+' : '';
            textEl.innerText = `${sign}${diff.toLocaleString()} (${sign}${percent.toFixed(2)}%)`;
            if (diff > 0) {
                textEl.className = "text-sm font-bold text-red-400";
                iconEl.className = "text-xs text-red-400 fa-solid fa-arrow-trend-up";
            } else if (diff < 0) {
                textEl.className = "text-sm font-bold text-blue-400";
                iconEl.className = "text-xs text-blue-400 fa-solid fa-arrow-trend-down";
            } else {
                textEl.className = "text-sm font-bold text-slate-400";
                iconEl.className = "text-xs text-slate-400 fa-solid fa-minus";
            }
        }

        function updateBaseDayCard(diff, percent) {
            const textEl = document.getElementById('base-day-change');
            const badgeEl = document.getElementById('base-day-badge');
            const sign = diff > 0 ? '+' : '';
            textEl.innerText = `${sign}${diff.toLocaleString()} (${sign}${percent.toFixed(2)}%)`;
            if (diff > 0) {
                textEl.className = "text-xl font-bold text-red-600";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-red-50 text-red-600";
                badgeEl.innerHTML = '<i class="fa-solid fa-arrow-trend-up"></i>';
            } else if (diff < 0) {
                textEl.className = "text-xl font-bold text-blue-600";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-blue-50 text-blue-600";
                badgeEl.innerHTML = '<i class="fa-solid fa-arrow-trend-down"></i>';
            } else {
                textEl.className = "text-xl font-bold text-slate-500";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-slate-100 text-slate-500";
                badgeEl.innerHTML = '<i class="fa-solid fa-minus"></i>';
            }
        }

        function renderChart(index, startIndex) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const filteredLabels = dateLabels.slice(startIndex);
            const filteredData = ColumnDataMaps[index].slice(startIndex);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredLabels,
                    datasets: [{
                        label: sheetHeaders[index],
                        data: filteredData,
                        borderColor: '#4f46e5',
                        borderWidth: 2.5,
                        pointRadius: 2,
                        pointHoverRadius: 5,
                        fill: false,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8', maxTicksLimit: 8 } },
                        y: {
                            grid: { color: '#f1f5f9' },
                            ticks: {
                                font: { size: 9 },
                                color: '#94a3b8',
                                callback: function(value) {
                                    return value >= 10000 ? (value / 10000).toLocaleString() + '만' : value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        window.onload = fetchGoogleSheetData;
    </script>
</body>
</html>
