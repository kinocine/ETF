<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Money - Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #F8F9FA;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 16px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 480px;
        }

        .dashboard-card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        
        .header-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #1E272E;
            margin-bottom: 24px;
        }

        .status-card {
            background-color: #F1F5F9;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .status-label {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .status-value {
            font-size: 26px;
            font-weight: bold;
            color: #0F172A;
            margin-bottom: 6px;
        }
        .status-change {
            font-size: 14px;
            font-weight: 600;
            color: #DC2626;
        }

        .alert-banner {
            background-color: #D32F2F;
            color: #FFFFFF;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .alert-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .alert-value {
            font-size: 22px;
            font-weight: bold;
        }

        .chart-container {
            width: 100%;
            margin-bottom: 24px;
            text-align: center;
        }
        .chart-placeholder {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            background-color: #eee;
        }

        .note-container {
            background-color: #FFFDF0;
            border: 1px solid #FFEAA7;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .note-header {
            font-size: 14px;
            font-weight: bold;
            color: #D63031;
            margin-bottom: 12px;
        }
        .note-content {
            font-size: 13px;
            color: #2F3542;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="dashboard-card">
        <h2 class="header-title">Happy Money</h2>
        
        <div class="status-card">
            <div class="status-label">타이거200IT 현황</div>
            <div class="status-value" id="val-test">로딩 중...</div>
            <div class="status-change" id="chg-test">전일 대비 변동: 계산 중...</div>
        </div>
        
        <div class="alert-banner">
            <div class="alert-label" id="lbl-test">투자총액 대비 증감액</div>
            <div class="alert-value" id="gap-test">계산 중...</div>
        </div>
        
        <div class="chart-container">
            <img class="chart-placeholder" id="chart-test" src="" alt="차트 불러오는 중...">
        </div>
        
        <div class="note-container">
            <div class="note-header">📙 투자 노트 (NOTE)</div>
            <div class="note-content" id="note-test">불러오는 중...</div>
        </div>
    </div>
</div>

<script>
    // 🔗 여기에 실제 작동하던 구글 스프레드시트 ID를 꼭 넣어주세요!
    const SPREADSHEET_ID = "YOUR_SPREADSHEET_ID_HERE"; 
    const SHEET_NAME = "시트1"; 
    const API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

    async function loadSingleData() {
        if (SPREADSHEET_ID === "YOUR_SPREADSHEET_ID_HERE") {
            document.getElementById("val-test").innerText = "시트 ID를 입력해주세요.";
            return;
        }

        try {
            const response = await fetch(API_URL);
            const text = await response.text();
            
            // 구글 JSONP 데이터 정제
            const jsonStart = text.indexOf("{");
            const jsonEnd = text.lastIndexOf("}");
            const jsonData = JSON.parse(text.substring(jsonStart, jsonEnd + 1));
            
            // 첫 번째 행(타이거200IT) 데이터만 가져오기
            const firstRow = jsonData.table.rows[0].c;

            // 기존 매핑 규칙 그대로 적용 (B열~G열)
            const currentVal = firstRow[1] ? (firstRow[1].f || firstRow[1].v) : '0'; 
            const changeVal  = firstRow[2] ? firstRow[2].v : '0 (0.00%)';       
            const gapVal     = firstRow[3] ? firstRow[3].v : '0 (-0.00%)';      
            const chartSrc   = firstRow[4] ? firstRow[4].v : '';                
            const noteText   = firstRow[5] ? firstRow[5].v : '등록된 노트가 없습니다.'; 
            const totalInfo  = firstRow[6] ? firstRow[6].v : ''; 

            // HTML 화면에 찍어주기
            document.getElementById("val-test").innerText = currentVal + " KRW";
            document.getElementById("chg-test").innerText = "전일 대비 변동: " + changeVal;
            document.getElementById("gap-test").innerText = gapVal;
            document.getElementById("chart-test").src = chartSrc;
            document.getElementById("note-test").innerText = noteText;
            if(totalInfo) {
                document.getElementById("lbl-test").innerText = `투자총액 (${totalInfo}) 대비 증감액`;
            }

        } catch (error) {
            console.error("데이터 로드 실패:", error);
            document.getElementById("val-test").innerText = "오류 발생 (콘솔 확인)";
        }
    }

    // 페이지 열리면 바로 실행
    window.addEventListener('DOMContentLoaded', loadSingleData);
</script>

</body>
</html>
