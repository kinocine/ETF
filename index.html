<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>해피머니 - 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; padding: 15px; color: #1e293b; margin: 0; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        .box-plus { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .box-minus { background: #dc2626; color: #ffffff; border: 1px solid #991b1b; }
        .tab-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 5px; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .tab-btn.active { background: #1e293b; color: white; }
        .card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .value { font-size: 20px; font-weight: 800; word-break: break-all; }
        .change-box { display: inline-block; padding: 5px 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .note-card { background: #fffde7; border: 1px solid #fef08a; border-radius: 16px; padding: 15px; margin-top: 15px; font-size: 14px; line-height: 1.5; }
        .chart-container { background: white; border-radius: 16px; padding: 15px; border: 1px solid #e2e8f0; height: 250px; margin-bottom: 15px; position: relative; }
        .hidden { display: none; }
        h1 { font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <h1>해피머니 <span id="currentDate" style="font-size: 16px; color: #64748b;"></span></h1>
    <div id="tabMenu" class="tab-menu"></div>
    <div id="pagesContainer"></div>
</div>

<script>
    const SPREADSHEET_CSV_URL = ""; 
    const headers = ["Total", "ETF", "타이거200IT", "KODEXIT", "ACE 미국빅테크TOP7Plus", "TIGER미국배당다우존스", "KIWOOM미국양자컴퓨팅", "1Q미국우주항공테크"];
    
    document.getElementById('currentDate').innerText = `(${new Date().getMonth()+1}월 ${new Date().getDate()}일)`;

    async function init() {
        const text = SPREADSHEET_CSV_URL ? await (await fetch(SPREADSHEET_CSV_URL)).text() : getDummy();
        render(text);
    }

    function render(text) {
        const rows = text.split('\n').map(l => l.split(','));
        const tabMenu = document.getElementById('tabMenu');
        const pagesContainer = document.getElementById('pagesContainer');

        headers.forEach((h, idx) => {
            const memoText = rows[1][idx + 1] || "등록된 메모가 없습니다.";
            const dataRows = rows.slice(2);
            const labels = dataRows.map(r => r[0]);
            const data = dataRows.map(r => parseFloat(r[idx + 1]?.replace(/,/g, '')) || 0);

            const current = data[data.length - 1];
            const prev = data[data.length - 2] || 0;
            const diff = current - prev;
            const colorClass = diff >= 0 ? 'box-plus' : 'box-minus';

            const btn = document.createElement('button');
            btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = h;
            btn.dataset.target = `page-${idx}`;
            btn.onclick = (e) => {
                document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(e.target.dataset.target).classList.remove('hidden');
                e.target.classList.add('active');
            };
            tabMenu.appendChild(btn);

            const div = document.createElement('div');
            div.id = `page-${idx}`;
            div.className = `page ${idx === 0 ? '' : 'hidden'}`;
            div.innerHTML = `
                <div class="card">
                    <div class="value">${h}: ${current.toLocaleString()} KRW</div>
                    <div class="change-box ${colorClass}">
                        전일 대비: ${diff >= 0 ? '+' : ''}${diff.toLocaleString()} KRW
                    </div>
                </div>
                <div class="chart-container"><canvas id="chart-${idx}"></canvas></div>
                <div class="note-card"><strong>[메모]</strong><br>${memoText}</div>
            `;
            pagesContainer.appendChild(div);

            new Chart(document.getElementById(`chart-${idx}`), {
                type: 'line',
                data: { labels: labels, datasets: [{ label: '금액', data: data, borderColor: '#0ea5e9', tension: 0.1 }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false },
                        x: { ticks: { font: { size: 10 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        });
    }

    function getDummy() {
        return `날짜,Total,ETF,타이거200IT,KODEXIT,ACE 미국빅테크TOP7Plus,TIGER미국배당다우존스,KIWOOM미국양자컴퓨팅,1Q미국우주항공테크
현황,이것도 못읽냐,뭐하냐,바로 해,123456,DJFDHKFL;KDAJGALK;,| ㅁㅎㄹ마와,ㅇㅁㅇ,ㅇㅎㄴㅇㅎ
4월1일,112837440,0,1119015,965705,98180,0,0,0
4월2일,112852114,0,1119015,965705,98180,0,0,0
6월16일,114059467,9117540,6402200,1168700,99840,883400,480870,82530
6월17일,114218256,9266705,6538175,1185340,100860,875840,483600,82890`;
    }

    init();
</script>
</body>
</html>
