<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>해피머니</title>
    <style>
        body { font-family: sans-serif; padding: 5px; background: #f8fafc; margin: 0; }
        #main-header { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .tab { padding: 4px 8px; background: #e2e8f0; border-radius: 12px; cursor: pointer; font-size: 9px; font-weight: bold; text-align: center; }
        .tab.active { background: #334155; color: white; }
        .tab.end-tab { background: #fee2e2; border: 1px solid #fecaca; } 
        .card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 8px; }
        .sector-title { font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 4px; }
        
        .diff-plus { color: #dc2626; font-weight: bold; }
        .diff-minus { color: #0284c7; font-weight: bold; }
        .box { background: #fffde7; padding: 6px; font-size: 9px; border: 1px solid #fef08a; border-radius: 4px; margin-bottom: 8px; }
        
        .result-box { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-top: 4px; }
        .box-gold { background-color: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .box-red { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        
        /* END 탭 종합 메모 리스트를 위한 모바일 전용 스타일 */
        .end-tab-content { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 8px; }
        .memo-list-container { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; max-height: 400px; overflow-y: auto; }
        .memo-item-card { background: #f1f5f9; padding: 8px 10px; border-radius: 6px; border-left: 4px solid #475569; font-size: 11px; color: #1e293b; line-height: 1.4; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div id="main-header">[해피머니] <span id="today-date"></span></div>
<div id="tabs" class="tabs"></div>

<div id="main-content">
    <div id="data-view">
        <div class="card">
            <div id="sector-name" class="sector-title">종목명</div>
            <div id="val" style="font-size: 20px; font-weight: 800; margin-bottom: 4px;">0원</div>
            <div><div id="diff">전일 대비: ±0원</div></div>
            <div><div id="invest-diff">투자대비: ±0원</div></div>
        </div>
        <div id="memo" class="box">메모 없음</div>
    </div>

    <div id="end-tab-view" class="end-tab-content" style="display: none;">
        <p style="margin: 0 0 6px 0; font-size: 12px; font-weight: bold; color: #333;">📊 구글 시트 종합 매매 일지 내역</p>
        <div id="memoListContainer" class="memo-list-container">
            <div class="memo-item-card">종합 메모를 불러오는 중입니다...</div>
        </div>
    </div>
</div>

<script>
    const today = new Date();
    document.getElementById('today-date').innerText = `${today.getFullYear()}. ${today.getMonth() + 1}. ${today.getDate()}`;

    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?output=csv";
    
    let rowsData = [], sectors = [], currentIdx = 1;
    let memoColIdx = -1; // "종합메모" 열 번호를 기억할 변수

    async function init() {
        const cacheBusterUrl = URL + "&t=" + new Date().getTime();
        const res = await fetch(cacheBusterUrl);
        const text = await res.text();
        rowsData = text.split(/\r?\n/).map(r => r.split(','));
        
        // 1행 전체를 뒤져서 정확히 "종합메모"라고 적힌 열의 인덱스를 자동 탐색
        memoColIdx = rowsData[0].findIndex(name => name.trim() === "종합메모");

        // 상단 탭 생성 시 "종합메모" 열과 "과거"가 포함된 열은 제외
        sectors = rowsData[0].map((name, i) => ({ name: name.trim(), col: i }))
                             .filter(s => s.name && !s.name.includes('과거') && s.name !== '종합메모');
        
        const tabContainer = document.getElementById('tabs');
        sectors.forEach((s, idx) => {
            if(idx === 0) return;
            createTab(s, idx);
        });

        // END 탭 생성 및 클릭 이벤트 매핑
        const endBtn = document.createElement('div');
        endBtn.className = 'tab end-tab';
        endBtn.innerText = 'END';
        endBtn.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
            endBtn.classList.add('active');
            
            document.getElementById('data-view').style.display = 'none';
            document.getElementById('end-tab-view').style.display = 'block';
            
            renderMemoList();
        };
        tabContainer.appendChild(endBtn);

        update();
    }

    // 종합메모 열의 2행부터 마지막 행까지 루프를 돌며 카드로 생성하는 함수
    function renderMemoList() {
        const container = document.getElementById('memoListContainer');
        container.innerHTML = ""; // 기존 내역 초기화

        if (memoColIdx === -1) {
            container.innerHTML = "<div class='memo-item-card'>구글 시트 1행에 '종합메모' 타이틀 열을 찾을 수 없습니다.</div>";
            return;
        }

        let hasMemo = false;

        // 2행(index 1)부터 데이터 끝까지 수직(행 기준)으로 탐색
        for (let i = 1; i < rowsData.length; i++) {
            const row = rowsData[i];
            if (row && row[memoColIdx]) {
                let cellText = row[memoColIdx].trim();
                
                // 데이터가 빈 칸이면 패스
                if (!cellText) continue;

                // 구글 시트 파싱 에러 방지를 위해 혹시 붙었을지 모를 양 끝 큰따옴표 제거
                if (cellText.startsWith('"') && cellText.endsWith('"')) {
                    cellText = cellText.substring(1, cellText.length - 1);
                }

                // 혹시 셀 내부에서 Alt+Enter 등으로 줄바꿈 처리가 되어 있다면 줄바꿈 적용
                cellText = cellText.replace(/\\n/g, '\n');

                // 메모 아이템 카드 동적 생성 및 추가 (의견 1 구조)
                const card = document.createElement('div');
                card.className = 'memo-item-card';
                card.innerText = cellText;
                container.appendChild(card);
                
                hasMemo = true;
            }
        }

        if (!hasMemo) {
            container.innerHTML = "<div class='memo-item-card'>기록된 종합 매매 내역이 없습니다.</div>";
        }
    }

    function createTab(s, idx) {
        const btn = document.createElement('div');
        btn.className = `tab ${idx === 1 ? 'active' : ''}`;
        btn.innerText = s.name.substring(0, 3);
        btn.onclick = () => { 
            currentIdx = idx; 
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
            btn.classList.add('active'); 
            
            document.getElementById('data-view').style.display = 'block';
            document.getElementById('end-tab-view').style.display = 'none';
            
            update(); 
        };
        document.getElementById('tabs').appendChild(btn);
    }

    function update() {
        const sector = sectors[currentIdx];
        const lastRow = rowsData[rowsData.length - 1];
        const prevRow = rowsData[rowsData.length - 2];
        const inputRow = rowsData[2];

        const val = parseFloat(lastRow[sector.col].trim().replace(/,/g, ''));
        const diff = val - parseFloat(prevRow[sector.col].trim().replace(/,/g, ''));
        
        const inputVal = inputRow && inputRow[sector.col] ? parseFloat(inputRow[sector.col].trim().replace(/,/g, '')) : 0;
        const investDiff = val - inputVal;

        document.getElementById('sector-name').innerText = sector.name;
        document.getElementById('val').innerText = `${val.toLocaleString()}원`;
        document.getElementById('memo').innerText = rowsData[1][sector.col] || "메모 없음";
        
        document.getElementById('diff').innerText = `전일 대비: ${diff >= 0 ? '+' : ''}${diff.toLocaleString()}원`;
        document.getElementById('diff').className = `result-box ${diff >= 0 ? 'box-gold' : 'box-red'}`;
        
        document.getElementById('invest-diff').innerText = `투자대비: ${investDiff >= 0 ? '+' : ''}${investDiff.toLocaleString()}원`;
        document.getElementById('invest-diff').className = `result-box ${investDiff >= 0 ? 'box-gold' : 'box-red'}`;
    }

    init();
</script>
</body>
</html>
