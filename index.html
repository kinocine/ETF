<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>해피머니</title>
    <style>
        body { font-family: sans-serif; padding: 5px; background: #f8fafc; margin: 0; }
        #main-header { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .tab { padding: 4px 8px; background: #e2e8f0; border-radius: 12px; cursor: pointer; font-size: 9px; font-weight: bold; text-align: center; }
        .tab.active { background: #334155; color: white; }
        .tab.end-tab { background: #fee2e2; border: 1px solid #fecaca; } 
        .card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 8px; }
        .sector-title { font-size: 13px; font-weight: bold; color: #475569; margin-bottom: 4px; }
        .diff-plus { color: #dc2626; font-weight: bold; }
        .diff-minus { color: #0284c7; font-weight: bold; }
        .box { background: #fffde7; padding: 6px; font-size: 9px; border: 1px solid #fef08a; border-radius: 4px; margin-bottom: 8px; }
        
        .end-tab-content { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 8px; }
        .token-input { width: 100%; padding: 6px; font-size: 11px; box-sizing: border-box; margin-bottom: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>

<div id="main-header">[해피머니] <span id="today-date"></span></div>
<div id="tabs" class="tabs"></div>

<div id="main-content">
    <div id="data-view">
        <div class="card">
            <div id="sector-name" class="sector-title">종목명</div>
            <div id="val" style="font-size: 20px; font-weight: 800;">0원</div>
            <div id="diff" style="font-size: 12px;">±0원</div>
        </div>
        <div id="memo" class="box">메모 없음</div>
    </div>

    <div id="end-tab-view" class="end-tab-content" style="display: none;">
        <p style="margin: 0 0 4px 0; font-size: 12px; font-weight: bold; color: #333;">🔑 GitHub 개인 토큰 입력</p>
        <input type="password" id="ghTokenInput" class="token-input" placeholder="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">

        <p style="margin: 8px 0 4px 0; font-size: 12px; font-weight: bold; color: #333;">📊 실시간 데이터 입력 (Plain Text)</p>
        <textarea id="endMemoText" 
                  placeholder="토큰 입력 후 END 탭을 다시 누르거나, 파일 내용을 로드하세요..." 
                  style="width: 100%; height: 150px; box-sizing: border-box; font-family: monospace; font-size: 14px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; white-space: pre; overflow-x: auto;"></textarea>
        
        <div style="margin-top: 6px; display: flex; align-items: center; justify-content: space-between;">
            <span id="endMemoStatus" style="font-size: 11px; color: #666;">토큰을 입력하고 불러오기를 누르세요.</span>
            <div>
                <button onclick="loadEndMemo()" style="padding: 6px 10px; background: #475569; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; margin-right: 4px;">가져오기</button>
                <button onclick="saveEndMemo()" style="padding: 6px 14px; background: #222; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold;">GitHub에 저장</button>
            </div>
        </div>
    </div>
</div>

<script>
    const today = new Date();
    document.getElementById('today-date').innerText = `${today.getFullYear()}. ${today.getMonth() + 1}. ${today.getDate()}`;

    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?output=csv";
    
    let rowsData = [], sectors = [], currentIdx = 1;

    // 고정된 개인 정보 설정
    const GH_OWNER = 'kinocine'; 
    const GH_REPO = 'end';       
    const GH_FILE_PATH = 'memo.txt'; 
    const GH_BRANCH = 'main';    
    
    const ghApiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE_PATH}`;
    let currentFileSha = ''; 

    async function init() {
        const res = await fetch(URL);
        const text = await res.text();
        rowsData = text.split(/\r?\n/).map(r => r.split(','));
        sectors = rowsData[0].map((name, i) => ({ name: name.trim(), col: i }))
                             .filter(s => s.name && !s.name.includes('과거'));
        
        const tabContainer = document.getElementById('tabs');
        sectors.forEach((s, idx) => {
            if(idx === 0) return;
            createTab(s, idx);
        });

        const endBtn = document.createElement('div');
        endBtn.className = 'tab end-tab';
        endBtn.innerText = 'END';
        endBtn.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
            endBtn.classList.add('active');
            
            document.getElementById('data-view').style.display = 'none';
            document.getElementById('end-tab-view').style.display = 'block';
            
            // 입력창에 토큰이 있을 때만 자동으로 불러오기 실행
            if (document.getElementById('ghTokenInput').value) {
                loadEndMemo();
            }
        };
        tabContainer.appendChild(endBtn);

        update();
        
        // 브라우저가 토큰을 임시 기억하도록 브라우저 저장소에서 가져오기 (매번 치기 귀찮음 방지)
        if (localStorage.getItem('my_gh_token')) {
            document.getElementById('ghTokenInput').value = localStorage.getItem('my_gh_token');
        }
    }

    function createTab(s, idx) {
        const btn = document.createElement('div');
        btn.className = `tab ${idx === 1 ? 'active' : ''}`;
        btn.innerText = s.name.substring(0, 3);
        btn.onclick = () => { 
            currentIdx = idx; 
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
            btn.classList.add('active'); 
            
            document.getElementById('data-view').style.display = 'block';
            document.getElementById('end-tab-view').style.display = 'none';
            
            update(); 
        };
        document.getElementById('tabs').appendChild(btn);
    }

    function update() {
        const sector = sectors[currentIdx];
        const lastRow = rowsData[rowsData.length - 1];
        const prevRow = rowsData[rowsData.length - 2];
        const val = parseFloat(lastRow[sector.col].trim().replace(/,/g, ''));
        const diff = val - parseFloat(prevRow[sector.col].trim().replace(/,/g, ''));

        document.getElementById('sector-name').innerText = sector.name;
        document.getElementById('val').innerText = `${val.toLocaleString()}원`;
        document.getElementById('memo').innerText = rowsData[1][sector.col] || "메모 없음";
        document.getElementById('diff').innerText = `전일 대비: ${diff >= 0 ? '+' : ''}${diff.toLocaleString()}원`;
        document.getElementById('diff').className = diff >= 0 ? 'diff-plus' : 'diff-minus';
    }

    // [GitHub 기능 1] 토큰 값을 입력받아 실시간 파일 로드
    function loadEndMemo() {
        const token = document.getElementById('ghTokenInput').value.trim();
        if (!token) {
            document.getElementById('endMemoStatus').style.color = 'red';
            document.getElementById('endMemoStatus').innerText = "❌ 토큰을 먼저 입력해 주세요.";
            return;
        }
        
        // 입력한 토큰을 브라우저에 안전하게 임시 저장
        localStorage.setItem('my_gh_token', token);

        document.getElementById('endMemoStatus').style.color = '#666';
        document.getElementById('endMemoStatus').innerText = "🔄 GitHub 동기화 중...";

        fetch(ghApiUrl, {
            headers: { "Authorization": `token ${token}` }
        })
        .then(res => {
            if (res.status === 404) {
                currentFileSha = '';
                document.getElementById('endMemoStatus').style.color = 'orange';
                document.getElementById('endMemoStatus').innerText = "📝 신규 파일 상태입니다.";
                return null;
            }
            if (!res.ok) throw new Error('토큰 값이 틀렸거나 권한이 없습니다.');
            return res.json();
        })
        .then(data => {
            if (!data) return;
            currentFileSha = data.sha; 
            
            const decoded = decodeURIComponent(atob(data.content.replace(/\s/g, '')).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            document.getElementById('endMemoText').value = decoded;
            document.getElementById('endMemoStatus').style.color = 'green';
            document.getElementById('endMemoStatus').innerText = "✅ 최신 데이터를 가져왔습니다.";
        })
        .catch(err => {
            document.getElementById('endMemoStatus').style.color = 'red';
            document.getElementById('endMemoStatus').innerText = "❌ 실패: " + err.message;
        });
    }

    // [GitHub 기능 2] 입력된 토큰을 사용하여 파일 저장
    function saveEndMemo() {
        const token = document.getElementById('ghTokenInput').value.trim();
        const content = document.getElementById('endMemoText').value;
        
        if (!token) {
            document.getElementById('endMemoStatus').style.color = 'red';
            document.getElementById('endMemoStatus').innerText = "❌ 토큰이 없습니다.";
            return;
        }

        document.getElementById('endMemoStatus').style.color = '#666';
        document.getElementById('endMemoStatus').innerText = "⏳ GitHub에 저장 중...";

        const base64Content = btoa(encodeURIComponent(content).replace(/%([0-9A-F]{2})/g, function(match, p1) {
            return String.fromCharCode(parseInt(p1, 16));
        }));

        const bodyData = {
            branch: GH_BRANCH,
            message: "Dashboard [END] Tab에서 메모 수정",
            content: base64Content
        };
        
        if (currentFileSha) {
            bodyData.sha = currentFileSha;
        }

        fetch(ghApiUrl, {
            method: 'PUT',
            headers: {
                "Authorization": `token ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(bodyData)
        })
        .then(res => {
            if (res.ok) return res.json();
            throw new Error('전송 실패. 토큰 만료 여부를 확인하세요.');
        })
        .then(data => {
            currentFileSha = data.content.sha; 
            document.getElementById('endMemoStatus').style.color = 'blue';
            document.getElementById('endMemoStatus').innerText = "🚀 GitHub 저장 완료! (줄바꿈 보존)";
        })
        .catch(err => {
            document.getElementById('endMemoStatus').style.color = 'red';
            document.getElementById('endMemoStatus').innerText = "❌ 오류: " + err.message;
        });
    }

    init();
</script>
</body>
</html>
깃랩 토큰 두번째것. 넣고.. 손본것
