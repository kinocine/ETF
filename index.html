<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해피머니 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 5px; background: #f8fafc; margin: 0; }
        .date-header { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #1e293b; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .tab-menu { display: flex; flex-wrap: nowrap; gap: 2px; overflow-x: auto; margin-bottom: 8px; }
        .tab-btn { flex: 0 0 auto; padding: 4px 6px; border: 1px solid #ccc; background: #fff; font-size: 9px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #333; color: #fff; }
        .card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 8px; }
        .value { font-size: 15px; font-weight: 800; }
        .diff { font-size: 11px; font-weight: bold; margin-top: 2px; }
        .plus { color: #dc2626; } /* 흑자: 붉은색 */
        .minus { color: #0284c7; } /* 적자: 푸른색 */
        .note-card { background: #fffde7; padding: 8px; border-radius: 8px; font-size: 11px; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="lastUpdateDate" class="date-header"></div>
<div id="tabMenu" class="tab-menu"></div>
<div id="pagesContainer"></div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?output=csv";
    const headers = ["Total", "ETF", "T200IT", "KODEX", "빅테크7", "배당다우", "양자컴", "우주항공"];

    async function init() {
        const text = await (await fetch(CSV_URL)).text();
        render(text);
    }

    function render(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
        const row2Cells = lines[1].split(',');
        const timeSeriesRows = lines.slice(3);

        // 상단 날짜
        document.getElementById('lastUpdateDate').innerText = `[해피머니] 최종 업데이트일자: ${timeSeriesRows[timeSeriesRows.length - 1].split(',')[0]}`;

        headers.forEach((h, idx) => {
            const memoText = row2Cells[idx + 1] || "";
            const labels = timeSeriesRows.map(r => r.split(',')[0]);
            const data = timeSeriesRows.map(r => parseFloat(r.split(',')[idx + 1]) || null);

            const current = data[data.length - 1] || 0;
            const prev = data[data.length - 2] || 0;
            const diff = current - prev;

            const btn = document.createElement('button');
            btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = h;
            btn.onclick = () => {
                document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`page-${idx}`).classList.remove('hidden');
                btn.classList.add('active');
            };
            document.getElementById('tabMenu').appendChild(btn);

            const div = document.createElement('div');
            div.id = `page-${idx}`;
            div.className = `page ${idx === 0 ? '' : 'hidden'}`;
            // [박스] 토탈 등 글자 제거, 줄바꿈, 컬러 구분 적용
            div.innerHTML = `
                <div class="card">
                    <div class="value">${current}원</div>
                    <div class="diff ${diff >= 0 ? 'plus' : 'minus'}">전일 대비: ${diff >= 0 ? '+' : ''}${diff}원</div>
                </div>
                <div style="height:150px;"><canvas id="chart-${idx}"></canvas></div>
                <div class="note-card">${memoText}</div>
            `;
            document.getElementById('pagesContainer').appendChild(div);

            new Chart(document.getElementById(`chart-${idx}`), {
                type: 'line',
                data: { labels: labels, datasets: [{ data: data, borderColor: '#0ea5e9', spanGaps: false }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { y: { ticks: { display: false } }, x: { ticks: { font: { size: 8 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        });
    }
    init();
</script>
</body>
</html>
