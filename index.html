<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 bg-white shadow-lg">
        
        <header class="py-4 border-b border-slate-100 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-slate-950">
                <i class="fa-solid fa-chart-line text-indigo-600 mr-1"></i> Happy 평촌
            </h1>
            <span id="current-date" class="text-sm text-slate-500 font-medium bg-slate-100 px-2.5 py-1 rounded-full">로딩 중...</span>
        </header>

        <main class="flex-1 flex flex-col justify-center space-y-4 my-6">
            
            <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-2xl p-6 shadow-md">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">현재 토탈 금액</p>
                <div class="flex items-baseline justify-between mb-4">
                    <span id="total-amount" class="text-3xl font-extrabold tracking-tight">0</span>
                    <span class="text-sm text-slate-400 font-medium">KRW</span>
                </div>
                
                <div class="pt-3 border-t border-slate-700/50 flex items-center justify-between">
                    <span class="text-xs text-slate-400 font-medium">전일 대비 변동</span>
                    <div class="flex items-center space-x-1.5">
                        <span id="prev-day-change" class="text-sm font-bold">-</span>
                        <span id="prev-day-icon" class="text-xs"></span>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-slate-500 mb-0.5">기준일(4/1) 대비 총 증감</p>
                    <span id="base-day-change" class="text-xl font-bold">-</span>
                </div>
                <div id="base-day-badge" class="w-10 h-10 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-minus"></i>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-xs font-semibold text-slate-500 mb-3"><i class="fa-solid fa-wallet mr-1"></i> 보유 종목별 현황</p>
                <div id="item-list-container" class="space-y-3">
                    <p class="text-sm text-slate-400 text-center py-2">종목 데이터를 불러오는 중...</p>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                <p class="text-xs font-semibold text-slate-500 mb-3"><i class="fa-solid fa-trend-up mr-1"></i> 자산 추이 (4월 1일 ~)</p>
                <div class="relative w-full h-40">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

        </main>

        <footer class="py-4 text-center border-t border-slate-100 text-xs text-slate-400">
            © 2026 Kinocine. 매일 아침 업데이트.
        </footer>
    </div>

    <script>
        // ⚠️ [필수] 아래 큰따옴표 안에 구글 스프레드시트에서 게시한 CSV 주소를 넣어주세요.
        const sheetUrl = "여기에_구글시트_CSV_주소_넣기";

        let rawData = [];
        let stockHeaders = []; 
        let latestStocks = {}; 

        async function fetchGoogleSheetData() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                
                const lines = csvText.split(/\r?\n/);
                if (lines.length < 2) return;

                // 1행 헤더 파싱
                const headers = parseCSVRow(lines[0]);
                
                // C열(인덱스 2)부터 끝까지 하단 리스트에 뿌릴 종목명으로 지정
                stockHeaders = headers.slice(2);

                const parsedData = [];

                // 2행부터 데이터 행별 순회 처리
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const columns = parseCSVRow(lines[i]);
                    
                    const dateValue = columns[0];
                    if (!dateValue) continue;

                    // ⭐ 복잡한 계산식 삭제: B열(인덱스 1)의 거대 숫자를 정직하게 그대로 추출
                    const totalValue = parseFloat(columns[1].replace(/[^0-9.-]/g, ""));

                    if (!isNaN(totalValue)) {
                        parsedData.push({
                            date: dateValue,
                            total: totalValue
                        });

                        // 가장 마지막(최신) 행인 경우 하단에 노출할 C열 이후 종목들의 숫자를 보관
                        if (i === lines.length - 1 || (i === lines.length - 2 && !lines[lines.length-1].trim())) {
                            stockHeaders.forEach((header, idx) => {
                                const rawPrice = columns[idx + 2];
                                if (rawPrice && rawPrice.trim()) {
                                    latestStocks[header] = parseFloat(rawPrice.replace(/[^0-9.-]/g, ""));
                                } else {
                                    latestStocks[header] = null; 
                                }
                            });
                        }
                    }
                }

                rawData = parsedData;
                initDashboard();

            } catch (error) {
                console.error("데이터 로딩 실패:", error);
                document.getElementById('current-date').innerText = "오류 발생";
            }
        }

        // CSV 큰따옴표 안 문자 보존용 정밀 파싱 함수
        function parseCSVRow(rowText) {
            const result = [];
            let insideQuote = false;
            let entries = "";
            
            for (let i = 0; i < rowText.length; i++) {
                const char = rowText[i];
                if (char === '"') {
                    insideQuote = !insideQuote;
                } else if (char === ',' && !insideQuote) {
                    result.push(entries.replace(/^"|"$/g, "").trim());
                    entries = "";
                } else {
                    entries += char;
                }
            }
            result.push(entries.replace(/^"|"$/g, "").trim());
            return result;
        }

        function initDashboard() {
            if (rawData.length === 0) return;

            const latest = rawData[rawData.length - 1];
            const prev = rawData.length > 1 ? rawData[rawData.length - 2] : latest;
            const base = rawData[0];

            document.getElementById('current-date').innerText = latest.date;
            document.getElementById('total-amount').innerText = latest.total.toLocaleString();

            // 1. 전일 대비 변동 계산
            const prevDiff = latest.total - prev.total;
            const prevPercent = prev.total !== 0 ? (prevDiff / prev.total) * 100 : 0;
            updatePrevDayUI(prevDiff, prevPercent);

            // 2. 기준일 대비 총 증감 계산
            const baseDiff = latest.total - base.total;
            const basePercent = base.total !== 0 ? (baseDiff / base.total) * 100 : 0;
            updateBaseDayCard('base-day-change', 'base-day-badge', baseDiff, basePercent);

            // 3. 우측 종목별 리스트 화면 생성
            renderStockList();

            // 4. 차트 그리기
            renderChart();
        }

        function updatePrevDayUI(diff, percent) {
            const textEl = document.getElementById('prev-day-change');
            const iconEl = document.getElementById('prev-day-icon');
            const sign = diff > 0 ? '+' : '';
            
            textEl.innerText = `${sign}${diff.toLocaleString()} (${sign}${percent.toFixed(3)}%)`;

            if (diff > 0) {
                textEl.className = "text-sm font-bold text-red-400";
                iconEl.className = "text-xs text-red-400 fa-solid fa-arrow-trend-up";
            } else if (diff < 0) {
                textEl.className = "text-sm font-bold text-blue-400";
                iconEl.className = "text-xs text-blue-400 fa-solid fa-arrow-trend-down";
            } else {
                textEl.className = "text-sm font-bold text-slate-400";
                iconEl.className = "text-xs text-slate-400 fa-solid fa-minus";
            }
        }

        function updateBaseDayCard(textId, badgeId, diff, percent) {
            const textEl = document.getElementById(textId);
            const badgeEl = document.getElementById(badgeId);
            const sign = diff > 0 ? '+' : '';

            textEl.innerText = `${sign}${diff.toLocaleString()} (${sign}${percent.toFixed(3)}%)`;

            if (diff > 0) {
                textEl.className = "text-xl font-bold text-red-600";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-red-50 text-red-600";
                badgeEl.innerHTML = '<i class="fa-solid fa-arrow-trend-up"></i>';
            } else if (diff < 0) {
                textEl.className = "text-xl font-bold text-blue-600";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-blue-50 text-blue-600";
                badgeEl.innerHTML = '<i class="fa-solid fa-arrow-trend-down"></i>';
            } else {
                textEl.className = "text-xl font-bold text-slate-500";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-slate-100 text-slate-500";
                badgeEl.innerHTML = '<i class="fa-solid fa-minus"></i>';
            }
        }

        function renderStockList() {
            const container = document.getElementById('item-list-container');
            container.innerHTML = ""; 

            let hasVisibleStock = false;

            stockHeaders.forEach(name => {
                const price = latestStocks[name];
                
                // 데이터가 존재하는 것만 리스트에 생성
                if (price !== null && !isNaN(price)) {
                    hasVisibleStock = true;
                    
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center py-1.5 border-b border-slate-100 last:border-0";
                    row.innerHTML = `
                        <span class="text-sm font-medium text-slate-600"><i class="fa-regular fa-circle-dot text-xs text-indigo-500 mr-1.5"></i>${name}</span>
                        <span class="text-sm font-bold text-slate-900">${price.toLocaleString()} <span class="text-xs font-normal text-slate-400 ml-0.5">원</span></span>
                    `;
                    container.appendChild(row);
                }
            });

            if (!hasVisibleStock) {
                container.innerHTML = `<p class="text-sm text-slate-400 text-center py-2">표시할 종목이 없습니다.</p>`;
            }
        }

        function renderChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const labels = rawData.map(item => item.date);
            const data = rawData.map(item => item.total);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '총 자산',
                        data: data,
                        borderColor: '#4f46e5',
                        borderWidth: 2,
                        pointRadius: 1.5,
                        pointHoverRadius: 4,
                        fill: false,
                        tension: 0.15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 9 }, color: '#94a3b8' }
                        },
                        y: {
                            grid: { color: '#f1f5f9' },
                            ticks: {
                                font: { size: 9 },
                                color: '#94a3b8',
                                callback: function(value) {
                                    return (value / 10000).toLocaleString() + '만';
                                }
                            }
                        }
                    }
                }
            });
        }

        window.onload = fetchGoogleSheetData;
    </script>
</body>
</html>
