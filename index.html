<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Money</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* 상태별 컬러 정의 */
            --plus-bg: #fef9c3;      /* 흑자: 라이트 골드 계열 배경 */
            --plus-text: #854d0e;    /* 흑자: 다크 골드 텍스트 */
            --minus-bg: #dc2626;     /* 적자: 레드 박스 배경 */
            --minus-text: #ffffff;   /* 적자: 흰색 텍스트 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 25px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* ◀ 종목명 ▶ 내비게이션 컨트롤러 구조 개선 */
        .page-controller {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--card-bg);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-main);
            padding: 5px 15px;
            transition: all 0.2s ease;
            user-select: none;
        }

        .nav-btn:hover:not(:disabled) {
            transform: scale(1.2);
            color: #000;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .current-stock-title {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 대시보드 카드 레이아웃 */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* 기본 카드 디자인 */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 22px 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .card .title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card .value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
        }

        .card .sub-value {
            font-size: 14px;
            font-weight: 600;
            margin-top: 6px;
        }

        /* 흑자/적자 동적 상태 클래스 */
        .card.status-plus {
            background-color: var(--plus-bg) !important;
            border-color: #fef08a;
        }
        .card.status-plus .title { color: #a16207; }
        .card.status-plus .value { color: var(--plus-text); }
        .card.status-plus .sub-value { color: #a16207; }

        .card.status-minus {
            background-color: var(--minus-bg) !important;
            border-color: var(--minus-bg);
        }
        .card.status-minus .title { color: rgba(255, 255, 255, 0.8); }
        .card.status-minus .value { color: var(--minus-text); }
        .card.status-minus .sub-value { color: rgba(255, 255, 255, 0.9); }

        /* 차트 영역 */
        .chart-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative;
            height: 350px;
            width: 100%;
        }

        .loading {
            text-align: center;
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="dashboard-title">Happy Money</h1>
    </header>

    <div class="page-controller">
        <button class="nav-btn" id="prevBtn" onclick="movePage(-1)" disabled>◀</button>
        <div class="current-stock-title" id="stockTitle"><span class="loading">불러오는 중...</span></div>
        <button class="nav-btn" id="nextBtn" onclick="movePage(1)" disabled>▶</button>
    </div>

    <div class="dashboard-grid">
        <div class="card" id="evalCard">
            <div class="title" id="evalTitle">종목 현황</div>
            <div class="value" id="curValue">- 원</div>
            <div class="sub-value" id="dayChange">전일 대비 변동: 계산 중...</div>
        </div>
        
        <div class="card" id="diffCard">
            <div class="title" id="diffTitle">투자총액 대비 증감액</div>
            <div class="value" id="curDiff">- 원</div>
            <div class="sub-value" id="curRate">- %</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="assetChart"></canvas>
    </div>
</div>

<script>
    // ⚠️ 구글 스프레드시트의 [웹에 게시 -> CSV] 주소를 아래에 넣으세요.
    const SPREADSHEET_CSV_URL = ""; 

    let globalRawRows = [];
    let parsedStocks = [];
    let currentPageIndex = 0;
    let currentChart = null;

    window.addEventListener('DOMContentLoaded', () => {
        if (SPREADSHEET_CSV_URL && SPREADSHEET_CSV_URL.startsWith("http")) {
            fetchCSVData(SPREADSHEET_CSV_URL);
        } else {
            console.log("구글 시트 URL이 없어 기본 내장 데이터로 데모를 구동합니다.");
            loadDummyData();
        }
    });

    function fetchCSVData(url) {
        fetch(url)
            .then(response => response.text())
            .then(text => {
                processRawText(text);
            })
            .catch(err => {
                alert("구글 시트 데이터를 가져오는데 실패했습니다. URL 혹은 권한을 확인하세요.");
                console.error(err);
            });
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result.map(cell => cell.replace(/^"|"$/g, '').trim());
    }

    function processRawText(text) {
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        globalRawRows = lines.map(line => parseCSVLine(line));

        if (globalRawRows.length === 0) return;

        buildStockPages();
    }

    function buildStockPages() {
        const headers = globalRawRows[0];
        parsedStocks = [];

        for (let i = 2; i < headers.length; i += 2) {
            const label = headers[i];
            if (label && !['원가', 'ETF', '날짜'].includes(label)) {
                parsedStocks.push({
                    name: label,
                    valIdx: i,       
                    costIdx: i + 1   
                });
            }
        }

        if (parsedStocks.length > 0) {
            currentPageIndex = 0;
            updateDashboardPage();
        }
    }

    function movePage(direction) {
        const targetIndex = currentPageIndex + direction;
        if (targetIndex >= 0 && targetIndex < parsedStocks.length) {
            currentPageIndex = targetIndex;
            updateDashboardPage();
        }
    }

    function updateDashboardPage() {
        const currentStock = parsedStocks[currentPageIndex];
        document.getElementById('stockTitle').innerText = currentStock.name;

        document.getElementById('prevBtn').disabled = (currentPageIndex === 0);
        document.getElementById('nextBtn').disabled = (currentPageIndex === parsedStocks.length - 1);

        renderDashboard(currentStock);
    }

    function renderDashboard(stock) {
        const labels = [];
        const evalValues = [];
        const costValues = [];
        
        let lastValidCost = 0;   
        let lastValidValue = 0;  
        let isStarted = false;   
        let baseDateStr = "5월 1일"; // 기본 기준일 디폴트값

        // 행 우선 탐색을 통해 최근 입력일 및 매수 신청 기준일 추적
        for (let i = 1; i < globalRawRows.length; i++) {
            const row = globalRawRows[i];
            const dateStr = row[0];

            // 1행 근처 정보 가독 영역에서 기준일 속성 가져오기 파싱 알고리즘 최적화
            if (i === 1 && row[stock.valIdx]) {
                const match = row[stock.valIdx].match(/(\d+월\s?\d+일|\d+\.\d+\.\d+)/);
                if (match) baseDateStr = match[1];
            }

            if (!dateStr || (!dateStr.includes('월') && !dateStr.includes('.'))) continue;

            const cleanVal = row[stock.valIdx] ? row[stock.valIdx].replace(/,/g, '').replace(/\s/g, '') : '';
            const cleanCost = row[stock.costIdx] ? row[stock.costIdx].replace(/,/g, '').replace(/\s/g, '') : '';

            const rawVal = cleanVal ? parseFloat(cleanVal) : NaN;
            const rawCost = cleanCost ? parseFloat(cleanCost) : NaN;

            if (!isNaN(rawVal)) lastValidValue = rawVal;
            if (!isNaN(rawCost)) lastValidCost = rawCost;

            let currentVal = isNaN(rawVal) ? lastValidValue : rawVal;
            let currentCost = isNaN(rawCost) ? lastValidCost : rawCost;

            if (currentCost > 0 || currentVal > 0) {
                isStarted = true;
            }

            if (!isStarted) continue;

            labels.push(dateStr);
            evalValues.push(currentVal);
            costValues.push(currentCost);
        }

        const lastIdx = evalValues.length - 1;
        if (lastIdx >= 0) {
            const latestVal = evalValues[lastIdx];
            const latestCost = costValues[lastIdx];
            
            // 전일 대비 데이터 변동 계산 (마지막 이전 데이터와 비교)
            let dayDiff = 0;
            let dayRate = 0;
            if (lastIdx > 0) {
                const prevVal = evalValues[lastIdx - 1];
                dayDiff = latestVal - prevVal;
                dayRate = prevVal > 0 ? (dayDiff / prevVal) * 100 : 0;
            }

            const diff = latestVal - latestCost;
            const rate = latestCost > 0 ? (diff / latestCost) * 100 : 0;

            // 1. 현재 평가 금액 카드 업데이트
            document.getElementById('evalTitle').innerText = `${stock.name} 현황`;
            document.getElementById('curValue').innerText = Math.round(latestVal).toLocaleString() + ' KRW';
            
            const dayChangeEl = document.getElementById('dayChange');
            dayChangeEl.innerText = `전일 대비 변동: ${dayDiff >= 0 ? '+' : ''}${Math.round(dayDiff).toLocaleString()} (${dayDiff >= 0 ? '+' : ''}${dayRate.toFixed(2)}%)`;

            // 2. 투자총액 대비 증감 카드 업데이트 및 배경색 제어
            document.getElementById('diffTitle').innerText = `투자총액 대비 (원가 최근 수치 입력일: ${baseDateStr}) 증감액`;
            document.getElementById('curDiff').innerText = `${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}`;
            document.getElementById('curRate').innerText = `(${diff >= 0 ? '+' : ''}${rate.toFixed(2)}%)`;

            const evalCard = document.getElementById('evalCard');
            const diffCard = document.getElementById('diffCard');

            // 흑자/적자에 따른 디자인 분기 적용
            if (diff >= 0) {
                evalCard.className = "card"; // 평가 현황은 기본 흰색 유지
                diffCard.className = "card status-plus"; // 흑자: 라이트 골드 박스
            } else {
                evalCard.className = "card"; 
                diffCard.className = "card status-minus"; // 적자: 레드 박스
            }
        }

        drawChart(labels, evalValues, costValues, stock.name);
    }

    function drawChart(labels, evalData, costData, stockName) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        
        if (currentChart) {
            currentChart.destroy(); 
        }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '현재 평가 금액',
                        data: evalData,
                        borderColor: '#1abc9c',
                        backgroundColor: 'rgba(26, 188, 156, 0.05)',
                        borderWidth: 3,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: '누적 매수 원가',
                        data: costData,
                        borderColor: '#7f8c8d',
                        borderWidth: 2,
                        borderDash: [5, 5], 
                        pointRadius: 2,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top', labels: { font: { size: 11, weight: 'bold' } } }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                    y: {
                        grid: { color: '#e2e8f0' },
                        ticks: {
                            font: { size: 10 },
                            callback: function(value) { return Math.round(value).toLocaleString() + '원'; }
                        }
                    }
                }
            }
        });
    }

        processRawText(dummyText);
    }
</script>

</body>
</html>
