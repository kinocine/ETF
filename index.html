<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Total & ETF Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .title { font-size: 14px; color: #64748b; font-weight: 600; margin-bottom: 10px; }
        .value { font-size: 24px; font-weight: 800; }
        .chart-container { background: #fff; border-radius: 16px; padding: 20px; height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboard">
        <div class="card">
            <div class="title" id="dateDisplay">기준 날짜: -</div>
            <div class="value" id="totalValue">Total: -</div>
            <div class="value" id="etfValue" style="color:#0ea5e9;">ETF: -</div>
        </div>
    </div>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    // 구글 시트 CSV URL 입력
    const SPREADSHEET_CSV_URL = ""; 

    async function fetchData() {
        try {
            const response = await fetch(SPREADSHEET_CSV_URL);
            const text = await response.text();
            processData(text);
        } catch (e) {
            console.error("데이터 로드 실패", e);
        }
    }

    function processData(text) {
        const rows = text.split('\n').map(row => row.split(','));
        const labels = [];
        const totalData = [];
        const etfData = [];

        // 3행(인덱스 2)부터 데이터 처리
        for (let i = 2; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0] || row[0].trim() === "") continue; // 날짜 없으면 건너뜀

            labels.push(row[0]);
            totalData.push(parseFloat(row[1]?.replace(/[^0-9]/g, '')) || 0);
            etfData.push(parseFloat(row[2]?.replace(/[^0-9]/g, '')) || 0);
        }

        renderUI(labels, totalData, etfData);
    }

    function renderUI(labels, total, etf) {
        const lastIdx = labels.length - 1;
        document.getElementById('dateDisplay').innerText = `기준 날짜: ${labels[lastIdx]}`;
        document.getElementById('totalValue').innerText = `Total: ${total[lastIdx].toLocaleString()} KRW`;
        document.getElementById('etfValue').innerText = `ETF: ${etf[lastIdx].toLocaleString()} KRW`;

        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Total', data: total, borderColor: '#1e293b' },
                    { label: 'ETF', data: etf, borderColor: '#0ea5e9' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchData();
</script>
</body>
</html>
