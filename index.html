<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinocine 자산 관리 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #1abc9c; /* 시트 테마와 어울리는 에메랄드 민트 */
            --accent-hover: #16a085;
            --plus-color: #e74c3c; /* 수익 발생 시 붉은색 (한국 기준) */
            --minus-color: #2980b9; /* 손실 발생 시 파란색 */
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 탭 스타일 */
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .tab-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .tab-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }

        /* 대시보드 카드 레이아웃 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .card .title {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 20px;
            font-weight: 700;
        }

        .value.plus { color: var(--plus-color); }
        .value.minus { color: var(--minus-color); }

        /* 차트 영역 */
        .chart-container {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: relative;
            height: 450px;
            width: 100%;
        }

        /* 로딩 알림 */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 16px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="dashboard-title">Kinocine 투자 자산 대시보드</h1>
        <p>구글 스프레드시트 연동형 실시간 매수 원가 대비 수익률 추적 시스템</p>
    </header>

    <div class="tabs-container" id="tabsBox">
        <div class="loading">데이터를 로드하는 중입니다...</div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="title">현재 평가 금액</div>
            <div class="value" id="curValue">- 원</div>
        </div>
        <div class="card">
            <div class="title">총 매수 원가</div>
            <div class="value" id="curCost">- 원</div>
        </div>
        <div class="card">
            <div class="title">매수 원가 대비 증감</div>
            <div class="value" id="curDiff">- 원</div>
        </div>
        <div class="card">
            <div class="title">수익률 (ROI)</div>
            <div class="value" id="curRate">- %</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="assetChart"></canvas>
    </div>
</div>

<script>
    // ⚠️ [필수 설정] 구글 스프레드시트의 [웹에 게시 -> CSV] 주소를 아래 파일 URL에 넣으세요.
    // 주소가 비어있으면 시스템에 내장된 이미지 기반 더미 데이터로 데모 작동합니다.
    const SPREADSHEET_CSV_URL = ""; 

    let globalRawRows = [];
    let parsedTabs = [];
    let currentChart = null;

    // 초기 구동 로직
    window.addEventListener('DOMContentLoaded', () => {
        if (SPREADSHEET_CSV_URL && SPREADSHEET_CSV_URL.startsWith("http")) {
            fetchCSVData(SPREADSHEET_CSV_URL);
        } else {
            console.log("구글 시트 URL이 없어 스크린샷 기반 더미 데이터로 데모를 구동합니다.");
            loadDummyData();
        }
    });

    // 구글 시트에서 CSV 긁어오기
    function fetchCSVData(url) {
        fetch(url)
            .then(response => response.text())
            .then(text => {
                processRawText(text);
            })
            .catch(err => {
                alert("구글 시트 데이터를 가져오는데 실패했습니다. URL 혹은 권한을 확인하세요.");
                console.error(err);
            });
    }

    // CSV 텍스트 파싱 처리
    function processRawText(text) {
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        globalRawRows = lines.map(line => {
            // 따옴표 내부 컴마 무시 규칙 적용 분할
            return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
        });

        if (globalRawRows.length === 0) return;

        buildTabsAndRender();
    }

    // 1행 분석하여 동적 탭 구성 (종목명 -> 원가 쌍 배치 규칙 적용)
    function buildTabsAndRender() {
        const headers = globalRawRows[0];
        parsedTabs = [];

        // C열(인덱스 2)부터 2칸씩 뛰며 종목 헤더 추출
        for (let i = 2; i < headers.length; i += 2) {
            const label = headers[i];
            if (label && !['원가', 'ETF', '날짜'].includes(label)) {
                parsedTabs.push({
                    name: label,
                    valIdx: i,       // 종목 평가금 열
                    costIdx: i + 1   // 바로 우측 원가 열
                });
            }
        }

        // 탭 UI 그리기
        const tabsBox = document.getElementById('tabsBox');
        tabsBox.innerHTML = '';

        parsedTabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = tab.name;
            btn.onclick = () => switchTab(index, btn);
            tabsBox.appendChild(btn);
        });

        // 첫 번째 탭 데이터 기본 활성화
        if (parsedTabs.length > 0) {
            renderDashboard(parsedTabs[0]);
        }
    }

    // 탭 전환 이벤트
    function switchTab(index, targetBtn) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        targetBtn.classList.add('active');
        renderDashboard(parsedTabs[index]);
    }

    // 핵심 로직: 선택된 종목의 데이터 정제 및 계산 화면 렌더링
    function renderDashboard(tab) {
        const labels = [];
        const evalValues = [];
        const costValues = [];
        
        let lastValidCost = 0;   // 빈 칸일 때 거슬러 올라가기 위한 원가 저장소
        let lastValidValue = 0;  // 빈 칸일 때 거슬러 올라가기 위한 평가금 저장소
        let isStarted = false;   // 투자가 시작된 날짜부터 차트에 그리기 위함

        // 2행(메모행) 건너뛰고 3행(인덱스 2)부터 순회
        for (let i = 1; i < globalRawRows.length; i++) {
            const row = globalRawRows[i];
            const dateStr = row[0];

            // 날짜 칸이 비어있거나 메모 형식(월 단위 매핑이 안되는 행) 필터링
            if (!dateStr || !dateStr.includes('월')) continue;

            // 현재 평가금 및 원가 파싱 (컴마 제거)
            const rawVal = row[tab.valIdx] ? parseFloat(row[tab.valIdx].replace(/,/g, '')) : NaN;
            const rawCost = row[tab.costIdx] ? parseFloat(row[tab.costIdx].replace(/,/g, '')) : NaN;

            // 평가금 처리
            let currentVal = isNaN(rawVal) ? lastValidValue : rawVal;
            // 원가 처리 (★빈 칸인 경우 직전 입력된 원가 데이터를 누적 추적)
            let currentCost = isNaN(rawCost) ? lastValidCost : rawCost;

            // 값 캐싱 업데이트
            if (!isNaN(rawVal)) lastValidValue = rawVal;
            if (!isNaN(rawCost)) lastValidCost = rawCost;

            // 해당 종목의 투자가 실제로 시작된 시점 감지
            if (currentCost > 0 || currentVal > 0) {
                isStarted = true;
            }

            // 투자가 시작 안 된 과거 시점은 데이터 수집에서 제외
            if (!isStarted) continue;

            labels.push(dateStr);
            evalValues.push(currentVal);
            costValues.push(currentCost);
        }

        // 최신(마지막 날짜) 데이터 요약 계산
        const lastIdx = evalValues.length - 1;
        if (lastIdx >= 0) {
            const latestVal = evalValues[lastIdx];
            const latestCost = costValues[lastIdx];
            const diff = latestVal - latestCost;
            const rate = latestCost > 0 ? (diff / latestCost) * 100 : 0;

            // 카드 UI 데이터 바인딩
            document.getElementById('curValue').innerText = latestVal.toLocaleString() + ' 원';
            document.getElementById('curCost').innerText = latestCost.toLocaleString() + ' 원';
            
            const diffEl = document.getElementById('curDiff');
            diffEl.innerText = (diff >= 0 ? '+' : '') + diff.toLocaleString() + ' 원';
            diffEl.className = `value ${diff >= 0 ? 'plus' : 'minus'}`;

            const rateEl = document.getElementById('curRate');
            rateEl.innerText = (rate >= 0 ? '+' : '') + rate.toFixed(2) + ' %';
            rateEl.className = `value ${rate >= 0 ? 'plus' : 'minus'}`;
        }

        // 차트 재생성
        drawChart(labels, evalValues, costValues, tab.name);
    }

    // Chart.js 시각화 구현
    function drawChart(labels, evalData, costData, stockName) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        
        if (currentChart) {
            currentChart.destroy(); // 기존 차트 파괴 후 재생성 (잔상 오류 방지)
        }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '현재 평가 금액',
                        data: evalData,
                        borderColor: '#1abc9c',
                        backgroundColor: 'rgba(26, 188, 156, 0.05)',
                        borderWidth: 3,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: '누적 매수 원가',
                        data: costData,
                        borderColor: '#7f8c8d',
                        borderWidth: 2,
                        borderDash: [5, 5], // 원가는 변동 시점을 파악하기 좋게 점선 처리
                        pointRadius: 2,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { font: { size: 12, weight: 'bold' } }
                    },
                    tooltip: {
                        padding: 12,
                        backgroundColor: 'rgba(44, 62, 80, 0.9)',
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y.toLocaleString() + '원';
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { font: { size: 11 } }
                    },
                    y: {
                        grid: { color: '#e2e8f0' },
                        ticks: {
                            font: { size: 11 },
                            callback: function(value) { return value.toLocaleString() + '원'; }
                        }
                    }
                }
            }
        });
    }

    // 사용자가 URL을 넣기 전에 브라우저에서 바로 확인할 수 있는 스크린샷 기반 더미 데모 데이터
    function loadDummyData() {

        processRawText(dummyText);
    }
</script>

</body>
</html>
