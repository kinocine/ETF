<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Money</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* 상태별 컬러 정의 */
            --plus-bg: #fef9c3;      /* 흑자: 라이트 골드 계열 배경 */
            --plus-text: #854d0e;    /* 흑자: 다크 골드 텍스트 */
            --minus-bg: #dc2626;     /* 적자: 레드 박스 배경 */
            --minus-text: #ffffff;   /* 적자: 흰색 텍스트 */
            --note-bg: #fffde7;      /* 투자 노트 배경 */
            --note-border: #fef08a;  /* 투자 노트 테두리 */
            --history-bg: #f1f5f9;   /* 과거 투자 종목 배경 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 25px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .page-controller {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--card-bg);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-main);
            padding: 5px 15px;
            transition: all 0.2s ease;
            user-select: none;
        }

        .nav-btn:hover:not(:disabled) {
            transform: scale(1.2);
            color: #000;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .current-stock-title {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 22px 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .card .title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card .value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
        }

        .card .sub-value {
            font-size: 14px;
            font-weight: 600;
            margin-top: 6px;
        }

        /* 흑자/적자 동적 상태 클래스 */
        .card.status-plus {
            background-color: var(--plus-bg) !important;
            border-color: #fef08a;
        }
        .card.status-plus .title { color: #a16207; }
        .card.status-plus .value { color: var(--plus-text); }
        .card.status-plus .sub-value { color: #a16207; }

        .card.status-minus {
            background-color: var(--minus-bg) !important;
            border-color: var(--minus-bg);
        }
        .card.status-minus .title { color: rgba(255, 255, 255, 0.8); }
        .card.status-minus .value { color: var(--minus-text); }
        .card.status-minus .sub-value { color: rgba(255, 255, 255, 0.9); }

        /* 투자 노트 스타일 */
        .note-card {
            background-color: var(--note-bg);
            border: 1px solid var(--note-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }
        .note-card .note-title {
            font-size: 15px;
            font-weight: 800;
            color: #854d0e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .note-card .note-content {
            font-size: 14px;
            color: #713f12;
            line-height: 1.6;
            white-space: pre-line; /* 줄바꿈 호환 */
            font-weight: 500;
        }

        .chart-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative;
            height: 350px;
            width: 100%;
            margin-bottom: 25px;
        }

        /* 과거 투자 종목 보관함 스타일 */
        .history-card {
            background-color: var(--history-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .history-card .history-title {
            font-size: 15px;
            font-weight: 800;
            color: #475569;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            background-color: #ffffff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border: 1px solid #cbd5e1;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .loading {
            text-align: center;
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="dashboard-title">Happy Money</h1>
    </header>

    <div class="page-controller">
        <button class="nav-btn" id="prevBtn" onclick="movePage(-1)" disabled>◀</button>
        <div class="current-stock-title" id="stockTitle"><span class="loading">불러오는 중...</span></div>
        <button class="nav-btn" id="nextBtn" onclick="movePage(1)" disabled>▶</button>
    </div>

    <div class="dashboard-grid">
        <div class="card" id="evalCard">
            <div class="title" id="evalTitle">종목 현황</div>
            <div class="value" id="curValue">- 원</div>
            <div class="sub-value" id="dayChange">전일 대비 변동: 계산 중...</div>
        </div>
        
        <div class="card" id="diffCard">
            <div class="title" id="diffTitle">투자총액 대비 증감액</div>
            <div class="value" id="curDiff">- 원</div>
            <div class="sub-value" id="curRate">- %</div>
        </div>
    </div>

    <div class="note-card">
        <div class="note-title">📦 투자 노트 (NOTE)</div>
        <div class="note-content" id="noteContent">해당 종목에 등록된 투자 노트가 없습니다.</div>
    </div>

    <div class="chart-container">
        <canvas id="assetChart"></canvas>
    </div>

    <div class="history-card">
        <div class="history-title">🗑️ 과거 투자 종목 (보관함)</div>
        <div class="history-tags" id="historyTags">
            <span style="color:#94a3b8; font-size:13px;">과거 보유 종목이 없습니다.</span>
        </div>
    </div>
</div>

<script>
    // ⚠️ 구글 스프레드시트의 [웹에 게시 -> CSV] 주소를 아래에 넣으세요.
    const SPREADSHEET_CSV_URL = ""; 

    let globalRawRows = [];
    let activeStocks = [];   // 현재 운용중인 종목 (잔고 > 0)
    let pastStocks = [];     // 전량 매도된 종목 (잔고 = 0 혹은 누락)
    let currentPageIndex = 0;
    let currentChart = null;

    window.addEventListener('DOMContentLoaded', () => {
        if (SPREADSHEET_CSV_URL && SPREADSHEET_CSV_URL.startsWith("http")) {
            fetchCSVData(SPREADSHEET_CSV_URL);
        } else {
            console.log("구글 시트 URL이 없어 기본 내장 데이터로 최신 시뮬레이션을 구동합니다.");
            loadDummyData();
        }
    });

    function fetchCSVData(url) {
        fetch(url)
            .then(response => response.text())
            .then(text => {
                processRawText(text);
            })
            .catch(err => {
                alert("구글 시트 데이터를 가져오는데 실패했습니다. URL 혹은 권한을 확인하세요.");
                console.error(err);
            });
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result.map(cell => cell.replace(/^"|"$/g, '').trim());
    }

    function processRawText(text) {
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        globalRawRows = lines.map(line => parseCSVLine(line));

        if (globalRawRows.length === 0) return;

        buildStockCategorization();
    }

    // 💡 전량 매도 분기, 투자 노트 자동 추출 로직 정비 완료 부
    function buildStockCategorization() {
        const headers = globalRawRows[0];
        
        activeStocks = [];
        pastStocks = [];

        // 1행을 스캔하면서 종목과 우측 BUY의 위치를 동적으로 파악
        for (let i = 0; i < headers.length; i++) {
            const label = headers[i];
            
            // 고정 필드가 아니고 값이 비어있지 않으며 'BUY'가 아닌 것 = 종목명 발견!
            if (label && !['날짜', 'ETF', 'BUY'].includes(label)) {
                
                // 우측 열이 BUY 헤더인지 파악
                let buyIdx = -1;
                if (i + 1 < headers.length && headers[i + 1] === 'BUY') {
                    buyIdx = i + 1;
                }

                // 📌 [과거종목 처리 핵심] 최하단 행(최신 날짜 행)의 잔고 값을 기준으로 활성/과거 분류
                let lastRowData = globalRawRows[globalRawRows.length - 1];
                let latestCellValue = lastRowData[i] ? lastRowData[i].replace(/,/g, '').replace(/\s/g, '') : '';
                
                let isCurrentInvestment = false;
                // 최신 셀이 비어있지 않고, '0'이 아니며, 숫자로 변환했을 때 0보다 큰 경우에만 현재 투자 종목으로 인정
                if (latestCellValue !== '' && latestCellValue !== '0' && !isNaN(parseFloat(latestCellValue))) {
                    if (parseFloat(latestCellValue) > 0) {
                        isCurrentInvestment = true;
                    }
                }

                // 📌 [투자 노트 추출 핵심] BUY 열 내부에서 텍스트 설명글 형태를 자동 감지 및 바인딩
                let extractedNote = "";
                if (buyIdx !== -1) {
                    for (let r = 1; r < globalRawRows.length; r++) {
                        let cellContent = globalRawRows[r][buyIdx];
                        if (cellContent && (isNaN(Number(cellContent.replace(/,/g, ''))) || cellContent.includes('\n') || cellContent.includes('*'))) {
                            extractedNote = cellContent;
                            break;
                        }
                    }
                }

                // BUY 열이 없는 고정 예외 종목(KODEXAI전력핵심설비, PLUSK방산 등) 상단 메모 역추적 보완
                if (!extractedNote) {
                    let fallbackCell = globalRawRows[1][i] || globalRawRows[2][i];
                    if (fallbackCell && isNaN(Number(fallbackCell.replace(/,/g, '')))) {
                        extractedNote = fallbackCell;
                    }
                }

                const stockObj = {
                    name: label,
                    valIdx: i,
                    buyIdx: buyIdx,
                    note: extractedNote || "등록된 투자 노트가 없습니다."
                };

                // 분기처리 조건문 적용
                if (isCurrentInvestment) {
                    activeStocks.push(stockObj);
                } else {
                    pastStocks.push(stockObj);
                }
            }
        }

        // 과거 종목 하단 칩 UI 렌더링
        renderPastStocksUI();

        if (activeStocks.length > 0) {
            currentPageIndex = 0;
            updateDashboardPage();
        } else {
            document.getElementById('stockTitle').innerText = "활성 종목 없음";
        }
    }

    function renderPastStocksUI() {
        const historyContainer = document.getElementById('historyTags');
        if (pastStocks.length === 0) {
            historyContainer.innerHTML = `<span style="color:#94a3b8; font-size:13px;">과거 보유 종목이 없습니다.</span>`;
            return;
        }

        historyContainer.innerHTML = pastStocks.map(stock => {
            return `<span class="tag">📦 ${stock.name}</span>`;
        }).join('');
    }

    function movePage(direction) {
        const targetIndex = currentPageIndex + direction;
        if (targetIndex >= 0 && targetIndex < activeStocks.length) {
            currentPageIndex = targetIndex;
            updateDashboardPage();
        }
    }

    function updateDashboardPage() {
        const currentStock = activeStocks[currentPageIndex];
        document.getElementById('stockTitle').innerText = currentStock.name;

        document.getElementById('prevBtn').disabled = (currentPageIndex === 0);
        document.getElementById('nextBtn').disabled = (currentPageIndex === activeStocks.length - 1);

        // 투자 노트 실시간 바인딩
        document.getElementById('noteContent').innerText = currentStock.note;

        renderDashboard(currentStock);
    }

    function renderDashboard(stock) {
        const labels = [];
        const evalValues = [];
        const costValues = [];
        
        let lastValidValue = 0;  
        let accumulatedCost = 0; // [BUY] 열 전체 데이터를 누적 Sum 할 변수
        let isStarted = false;   
        let lastCostDateStr = "-"; 

        // 3행부터 실 데이터 탐색
        for (let i = 2; i < globalRawRows.length; i++) {
            const row = globalRawRows[i];
            const dateStr = row[0];

            if (!dateStr || (!dateStr.includes('월' ) && !dateStr.includes('.'))) continue;

            const cleanVal = row[stock.valIdx] ? row[stock.valIdx].replace(/,/g, '').replace(/\s/g, '') : '';
            const rawVal = cleanVal ? parseFloat(cleanVal) : NaN;

            // 📌 [매수원가 파싱 오류 핵심 수정] 문자가 섞인 셀에서 정규식으로 숫자만 정확하게 발라내어 연산 오염 차단
            if (stock.buyIdx !== -1) {
                const rawCellText = row[stock.buyIdx] ? row[stock.buyIdx].trim() : '';
                if (rawCellText !== '') {
                    let cleanBuyText = rawCellText.replace(/[^0-9]/g, '');
                    if (cleanBuyText !== '' && !isNaN(parseFloat(cleanBuyText))) {
                        let parsedBuy = parseFloat(cleanBuyText);
                        if (parsedBuy > 0) {
                            accumulatedCost += parsedBuy;
                            lastCostDateStr = dateStr.replace('월', '/').replace('일', '').replace(/\s/g, '');
                        }
                    }
                }
            } else {
                // 고정 예외 종목 하드코딩 매핑 보완 (스프레드시트 구조 대응용)
                if (stock.name.includes("전력핵심설비")) accumulatedCost = 963850;
                if (stock.name.includes("방산")) accumulatedCost = 74520;
            }

            if (!isNaN(rawVal)) lastValidValue = rawVal;
            let currentVal = isNaN(rawVal) ? lastValidValue : rawVal;

            if (accumulatedCost > 0 || currentVal > 0) {
                isStarted = true;
            }

            if (!isStarted) continue;

            labels.push(dateStr);
            evalValues.push(currentVal);
            costValues.push(accumulatedCost); // 차트 점선 데이터 매칭
        }

        const lastIdx = evalValues.length - 1;
        if (lastIdx >= 0) {
            const latestVal = evalValues[lastIdx];
            const latestCost = costValues[lastIdx]; // 누적 원가 최종본
            
            // 전일 대비 데이터 변동 계산
            let dayDiff = 0;
            let dayRate = 0;
            if (lastIdx > 0) {
                const prevVal = evalValues[lastIdx - 1];
                dayDiff = latestVal - prevVal;
                dayRate = prevVal > 0 ? (dayDiff / prevVal) * 100 : 0;
            }

            const diff = latestVal - latestCost;
            const rate = latestCost > 0 ? (diff / latestCost) * 100 : 0;

            // 1. 현재 평가 금액 카드 업데이트
            document.getElementById('evalTitle').innerText = `${stock.name} 현황`;
            document.getElementById('curValue').innerText = Math.round(latestVal).toLocaleString() + ' KRW';
            
            const dayChangeEl = document.getElementById('dayChange');
            dayChangeEl.innerText = `전일 대비 변동: ${dayDiff >= 0 ? '+' : ''}${Math.round(dayDiff).toLocaleString()} (${dayDiff >= 0 ? '+' : ''}${dayRate.toFixed(2)}%)`;

            // 2. 투자총액 대비 증감 카드 업데이트
            document.getElementById('diffTitle').innerText = `투자총액 대비 (${lastCostDateStr} 매수원가합산 ${Math.round(latestCost).toLocaleString()}) 증감액`;
            document.getElementById('curDiff').innerText = `${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}`;
            document.getElementById('curRate').innerText = `(${diff >= 0 ? '+' : ''}${rate.toFixed(2)}%)`;

            const evalCard = document.getElementById('evalCard');
            const diffCard = document.getElementById('diffCard');

            // 흑자/적자에 따른 디자인 분기 적용
            if (diff >= 0) {
                evalCard.className = "card"; 
                diffCard.className = "card status-plus"; // 흑자: 라이트 골드
            } else {
                evalCard.className = "card"; 
                diffCard.className = "card status-minus"; // 적자: 레드 박스
            }
        }

        drawChart(labels, evalValues, costValues, stock.name);
    }

    function drawChart(labels, evalData, costData, stockName) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        
        if (currentChart) {
            currentChart.destroy(); 
        }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '현재 평가 금액',
                        data: evalData,
                        borderColor: '#1abc9c',
                        backgroundColor: 'rgba(26, 188, 156, 0.05)',
                        borderWidth: 3,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: '누적 투자금 (BUY 합계)',
                        data: costData,
                        borderColor: '#7f8c8d',
                        borderWidth: 2,
                        borderDash: [5, 5], 
                        pointRadius: 2,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top', labels: { font: { size: 11, weight: 'bold' } } }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                    y: {
                        grid: { color: '#e2e8f0' },
                        ticks: {
                            font: { size: 10 },
                            callback: function(value) { return Math.round(value).toLocaleString() + '원'; }
                        }
                    }
                }
            }
        });
    }

    function loadDummyData() {
        // 요구하신 최신 데이터 완전 복사 배포 (KODEXAI전력핵심설비 6월 12일자 0원 전량매도 처리 완료)
        const dummyText = `날짜,ETF,타이거200IT,BUY,KODEXIT,BUY,ACE 미국빅테크TOP7Plus,BUY,TIGER미국배당다우존스,BUY,KIWOOM미국양자컴퓨팅,BUY,1Q미국우주항공테크,BUY,KODEXAI전력핵심설비,PLUSK방산
,,5월4일 119916*8좌=953570원\n6월1일 190563*26좌=4954645원 추가,,"5월12일\n74,285*13좌=965,705",,97140 (4좌),,5월27일 15677*56좌=877960원,,5월26일 18536*26좌=481950,,2026.6.4 매수신청\n14813*6좌=88880,,5.7? 963850 (16좌)\n26.5.26 882875 (16좌\n-80930),2026.5.11 74520 (1좌)\n-2320
