<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinocine 자산 관리 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #1abc9c;
            --accent-hover: #16a085;
            --border-color: #e2e8f0;
            
            /* 변경 및 신규 추가 색상 정의 */
            --etf-status-bg: #ebf0f5;  /* 상단 ETF 현황 박스: 연한 청회색 라이트 컬러 */
            --box-plus-bg: #111111;    /* 수익(+) 발생 시 배경: 블랙 박스 */
            --box-minus-bg: #d9381e;   /* 손실(-) 발생 시 배경: 레드 박스 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 탭 스타일 */
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .tab-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .tab-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }

        /* 대시보드 카드 레이아웃 구조 변경 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        /* [상단 박스] ETF 현황 카드 전용 스타일 (라이트 컬러) */
        .card.etf-status-card {
            background-color: var(--etf-status-bg);
            border: 1px solid #d3dfeb;
        }

        /* [하단 박스] 조건부 색상 반전 카드 전용 스타일 */
        .card.condition-box {
            color: #ffffff;
            border: none;
        }
        .card.condition-box.bg-black {
            background-color: var(--box-plus-bg);
        }
        .card.condition-box.bg-red {
            background-color: var(--box-minus-bg);
        }

        .card .title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        /* 반전 박스 내부의 타이틀 글자색 처리 */
        .card.condition-box .title {
            color: rgba(255, 255, 255, 0.8);
        }

        .card .value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card .sub-value {
            font-size: 15px;
            font-weight: 600;
        }
        
        /* 라이트 박스 내부 변동 텍스트 색상 */
        .etf-status-card .value { color: #1a252f; }
        .etf-status-card .sub-value.text-plus { color: #d9381e; }
        .etf-status-card .sub-value.text-minus { color: #2980b9; }

        /* 차트 영역 */
        .chart-container {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: relative;
            height: 450px;
            width: 100%;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 16px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="dashboard-title">Kinocine 투자 자산 대시보드</h1>
        <p>구글 스프레드시트 연동형 실시간 매수 원가 대비 수익률 추적 시스템</p>
    </header>

    <div class="tabs-container" id="tabsBox">
        <div class="loading">데이터를 로드하는 중입니다...</div>
    </div>

    <div class="dashboard-grid">
        <div class="card etf-status-card">
            <div class="title" id="etf-title">ETF 현황</div>
            <div class="value" id="curValue">- KRW</div>
            <div class="sub-value" id="dayChange">전일 대비 변동: -</div>
        </div>
        
        <div class="card condition-box" id="roiCardBox">
            <div class="title" id="roiTitle">기준일 대비(원가 '셀' 최근 수치 입력일) 증감액</div>
            <div class="value" id="curDiff">- 원</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="assetChart"></canvas>
    </div>
</div>

<script>
    // ⚠️ [필수 설정] 구글 스프레드시트의 [웹에 게시 -> CSV] 주소를 아래 파일 URL에 넣으세요.
    const SPREADSHEET_CSV_URL = ""; 

    let globalRawRows = [];
    let parsedTabs = [];
    let currentChart = null;

    window.addEventListener('DOMContentLoaded', () => {
        if (SPREADSHEET_CSV_URL && SPREADSHEET_CSV_URL.startsWith("http")) {
            fetchCSVData(SPREADSHEET_CSV_URL);
        } else {
            console.log("구글 시트 URL이 없어 스크린샷 기반 더미 데이터로 데모를 구동합니다.");
            loadDummyData();
        }
    });

    function fetchCSVData(url) {
        fetch(url)
            .then(response => response.text())
            .then(text => {
                processRawText(text);
            })
            .catch(err => {
                alert("구글 시트 데이터를 가져오는데 실패했습니다. URL 혹은 권한을 확인하세요.");
                console.error(err);
            });
    }

    function processRawText(text) {
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        globalRawRows = lines.map(line => {
            return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
        });

        if (globalRawRows.length === 0) return;

        buildTabsAndRender();
    }

    // 1행 데이터 분석 및 [원가] 탭 완전 제외 필터링 로직
    function buildTabsAndRender() {
        const headers = globalRawRows[0];
        parsedTabs = [];

        // 인덱스 1(ETF열)부터 한 칸씩 이동하며 체크
        for (let i = 1; i < headers.length; i++) {
            const label = headers[i];
            
            // 공백이 아니고, 이름 자체가 정확히 '원가'가 아니며, '날짜'나 'ETF'가 아닌 실제 종목명만 추출
            if (label && label !== '원가' && label !== 'ETF' && label !== '날짜') {
                parsedTabs.push({
                    name: label,
                    valIdx: i,       // 종목 평가 금액 열 인덱스
                    costIdx: i + 1   // 바로 오른쪽 칸에 존재하는 [원가] 열 인덱스 (매핑 규칙)
                });
            }
        }

        const tabsBox = document.getElementById('tabsBox');
        tabsBox.innerHTML = '';

        parsedTabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = tab.name;
            btn.onclick = () => switchTab(index, btn);
            tabsBox.appendChild(btn);
        });

        if (parsedTabs.length > 0) {
            renderDashboard(parsedTabs[0]);
        }
    }

    function switchTab(index, targetBtn) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        targetBtn.classList.add('active');
        renderDashboard(parsedTabs[index]);
    }

    function renderDashboard(tab) {
        const labels = [];
        const evalValues = [];
        const costValues = [];
        const costDates = []; 
        
        let lastValidCost = 0;
        let lastValidValue = 0;
        let lastValidCostDate = ''; 
        let isStarted = false;

        for (let i = 1; i < globalRawRows.length; i++) {
            const row = globalRawRows[i];
            const dateStr = row[0];

            if (!dateStr || !dateStr.includes('월')) continue;

            const rawVal = row[tab.valIdx] ? parseFloat(row[tab.valIdx].replace(/,/g, '')) : NaN;
            const rawCost = row[tab.costIdx] ? parseFloat(row[tab.costIdx].replace(/,/g, '')) : NaN;

            let currentVal = isNaN(rawVal) ? lastValidValue : rawVal;
            let currentCost = isNaN(rawCost) ? lastValidCost : rawCost;

            if (!isNaN(rawVal)) lastValidValue = rawVal;
            if (!isNaN(rawCost)) {
                lastValidCost = rawCost;
                lastValidCostDate = dateStr; 
            }

            if (currentCost > 0 || currentVal > 0) {
                isStarted = true;
            }

            if (!isStarted) continue;

            labels.push(dateStr);
            evalValues.push(currentVal);
            costValues.push(currentCost);
            costDates.push(lastValidCostDate);
        }

        const lastIdx = evalValues.length - 1;
        if (lastIdx >= 0) {
            const latestVal = evalValues[lastIdx];
            const latestCost = costValues[lastIdx];
            const latestCostDate = costDates[lastIdx] || '미정';
            
            const diff = latestVal - latestCost;
            const rate = latestCost > 0 ? (diff / latestCost) * 100 : 0;

            // 전일 수치 역추적 계산 로직 (공란일 경우 가장 최근 유효값 대비 계산)
            let prevVal = latestVal;
            for (let j = lastIdx - 1; j >= 0; j--) {
                if (evalValues[j] !== latestVal && evalValues[j] > 0) {
                    prevVal = evalValues[j];
                    break;
                }
            }
            if (prevVal === latestVal && lastIdx > 0) {
                prevVal = evalValues[lastIdx - 1];
            }

            const dayDiff = latestVal - prevVal;
            const dayRate = prevVal > 0 ? (dayDiff / prevVal) * 100 : 0;

            // 1. ETF 현황 박스 데이터 바인딩 (라이트 컬러)
            document.getElementById('etf-title').innerText = `${tab.name} 현황`;
            document.getElementById('curValue').innerText = latestVal.toLocaleString() + ' KRW';
            
            const dayChangeEl = document.getElementById('dayChange');
            const dayDiffSign = dayDiff >= 0 ? '+' : '';
            dayChangeEl.innerText = `전일 대비 변동: ${dayDiffSign}${dayDiff.toLocaleString()} (${dayDiffSign}${dayRate.toFixed(2)}%)`;
            dayChangeEl.className = `sub-value ${dayDiff >= 0 ? 'text-plus' : 'text-minus'}`;

            // 2. 기준일 대비 명칭 세팅 및 날짜 결합
            document.getElementById('roiTitle').innerText = `기준일 대비(원가 '셀' 최근 수치 입력일: ${latestCostDate}) 증감액`;

            // 3. 조건부 박스 배경색 매핑 (플러스면 블랙박스, 마이너스면 레드박스)
            const roiCardBox = document.getElementById('roiCardBox');
            const diffEl = document.getElementById('curDiff');
            const totalSign = diff >= 0 ? '+' : '';
            
            diffEl.innerText = `${totalSign}${diff.toLocaleString()} (${totalSign}${rate.toFixed(2)}%)`;

            if (diff >= 0) {
                roiCardBox.className = "card condition-box bg-black";
            } else {
                roiCardBox.className = "card condition-box bg-red";
            }
        }

        drawChart(labels, evalValues, costValues, tab.name);
    }

    function drawChart(labels, evalData, costData, stockName) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        
        if (currentChart) {
            currentChart.destroy();
        }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '현재 평가 금액',
                        data: evalData,
                        borderColor: '#1abc9c',
                        backgroundColor: 'rgba(26, 188, 156, 0.05)',
                        borderWidth: 3,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: '누적 매수 원가',
                        data: costData,
                        borderColor: '#7f8c8d',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointRadius: 2,
                        fill: false,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { font: { size: 12, weight: 'bold' } }
                    },
                    tooltip: {
                        padding: 12,
                        backgroundColor: 'rgba(44, 62, 80, 0.9)',
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y.toLocaleString() + '원';
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { font: { size: 11 } }
                    },
                    y: {
                        grid: { color: '#e2e8f0' },
                        ticks: {
                            font: { size: 11 },
                            callback: function(value) { return value.toLocaleString() + '원'; }
                        }
                    }
                }
            }
        });
    }

    function loadDummyData() {
        // 기존의 불완전했던 테스트용 더미 텍스트 헤더 배열을 시트와 1:1로 일치시켰습니다.
        const dummyText = `날짜,ETF,타이거200IT,원가,KODEXIT,원가,ACE 미국빅테크TOP7Plus,원가,TIGER미국배당다우존스,원가,KIWOOM미국양자컴퓨팅,원가,1Q미국우주항공테크,원가

        processRawText(dummyText);
    }
</script>

</body>
</html>
