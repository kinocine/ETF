<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>해피머니 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 5px; background: #f8fafc; }
        .date-header { font-size: 13px; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-bottom: 10px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .value { font-size: 18px; font-weight: 800; }
        .diff { font-size: 13px; font-weight: bold; margin-top: 5px; }
        .plus { color: #dc2626; } .minus { color: #0284c7; }
        .note-card { background: #fffde7; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="header" class="date-header"></div>
<div class="card">
    <div id="val" class="value"></div>
    <div id="diff" class="diff"></div>
</div>
<div style="height:200px;"><canvas id="chart"></canvas></div>
<div id="memo" class="note-card"></div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?output=csv";

    async function init() {
        const text = await (await fetch(URL)).text();
        const rows = text.split(/\r?\n/).map(r => r.split(','));
        const memoText = rows[1][1] || "";
        
        // 4행(인덱스 3)부터 시작. 
        // 1. A열(날짜)이 비어있지 않고 2. B열(Total)이 비어있지 않으며 3. 숫자인 행만 추출
        const data = rows.slice(3).filter(r => 
            r[0] && r[0].trim() !== "" && 
            r[1] && r[1].trim() !== "" &&
            !isNaN(parseFloat(r[1].replace(/,/g, '')))
        ).map(r => ({
            date: r[0].trim(),
            value: parseFloat(r[1].replace(/,/g, ''))
        }));
        
        const lastData = data[data.length - 1];
        const prevData = data[data.length - 2];
        const diff = lastData.value - (prevData ? prevData.value : 0);

        // 업데이트 날짜 형식: [Happy Money] 6월 17일
        document.getElementById('header').innerText = `[Happy Money] ${lastData.date}`;
        document.getElementById('val').innerText = `${lastData.value.toLocaleString()}원`;
        document.getElementById('diff').innerText = `전일 대비: ${diff >= 0 ? '+' : ''}${diff.toLocaleString()}원`;
        document.getElementById('diff').className = `diff ${diff >= 0 ? 'plus' : 'minus'}`;
        document.getElementById('memo').innerText = memoText;

        new Chart(document.getElementById('chart'), {
            type: 'line',
            data: { 
                labels: data.map(d => d.date), 
                datasets: [{ data: data.map(d => d.value), borderColor: '#0ea5e9', spanGaps: false, pointRadius: 2 }] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { y: { display: false }, x: { ticks: { font: { size: 9 } } } },
                plugins: { legend: { display: false } }
            }
        });
    }
    init();
</script>
</body>
</html>
