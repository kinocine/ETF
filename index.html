<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>해피머니 - 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; padding: 10px; color: #1e293b; margin: 0; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        
        /* 메뉴를 한 줄에 다 넣기 위해 극단적으로 축소 */
        .tab-menu { display: flex; flex-wrap: nowrap; gap: 2px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 0 0 auto; padding: 4px 6px; border: 1px solid #e2e8f0; background: white; border-radius: 4px; cursor: pointer; font-size: 9px; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: #1e293b; color: white; border-color: #1e293b; }
        
        .box-plus { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .box-minus { background: #dc2626; color: #ffffff; border: 1px solid #991b1b; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .value { font-size: 16px; font-weight: 800; }
        .change-box { display: inline-block; padding: 3px 6px; border-radius: 4px; font-weight: bold; margin-top: 5px; font-size: 11px; }
        .note-card { background: #fffde7; border: 1px solid #fef08a; border-radius: 12px; padding: 10px; font-size: 12px; }
        .chart-container { background: white; border-radius: 12px; padding: 10px; border: 1px solid #e2e8f0; height: 180px; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="tabMenu" class="tab-menu"></div>
    <div id="pagesContainer"></div>
</div>

<script>
    const SPREADSHEET_CSV_URL = ""; 
    const headers = ["Total", "ETF", "T200IT", "KODEX", "빅테크7", "배당다우", "양자컴", "우주항공"];
    const fullNames = ["Total", "ETF", "타이거200IT", "코덱시트", "ACE 미국빅테크TOP7Plus", "TIGER미국배당다우존스", "KIWOOM미국양자컴퓨팅", "1Q미국우주항공테크"];

    async function init() {
        const text = SPREADSHEET_CSV_URL ? await (await fetch(SPREADSHEET_CSV_URL)).text() : getDummy();
        render(text);
    }

    function render(text) {
        const rows = text.split('\n').map(l => l.split(','));
        const tabMenu = document.getElementById('tabMenu');
        const pagesContainer = document.getElementById('pagesContainer');

        headers.forEach((h, idx) => {
            const memoText = rows[1][idx + 1] || "메모 없음";
            const dataRows = rows.slice(2);
            const labels = dataRows.map(r => r[0]);
            const data = dataRows.map(r => parseFloat(r[idx + 1]?.replace(/,/g, '')) || 0);

            const current = data[data.length - 1];
            const prev = data[data.length - 2] || 0;
            const diff = current - prev;
            const colorClass = diff >= 0 ? 'box-plus' : 'box-minus';

            const btn = document.createElement('button');
            btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = h; // 축약된 이름 사용
            btn.onclick = () => {
                document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`page-${idx}`).classList.remove('hidden');
                btn.classList.add('active');
            };
            tabMenu.appendChild(btn);

            const div = document.createElement('div');
            div.id = `page-${idx}`;
            div.className = `page ${idx === 0 ? '' : 'hidden'}`;
            div.innerHTML = `
                <div class="card">
                    <div class="value">${fullNames[idx]}: ${current.toLocaleString()}원</div>
                    <div class="change-box ${colorClass}">전일 대비: ${diff >= 0 ? '+' : ''}${diff.toLocaleString()}원</div>
                </div>
                <div class="chart-container"><canvas id="chart-${idx}"></canvas></div>
                <div class="note-card"><strong>[메모]</strong> ${memoText}</div>
            `;
            pagesContainer.appendChild(div);

            new Chart(document.getElementById(`chart-${idx}`), {
                type: 'line',
                data: { labels: labels, datasets: [{ label: '금액', data: data, borderColor: '#0ea5e9', borderWidth: 2, pointRadius: 1, tension: 0.1 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { ticks: { font: { size: 8 } } } }, plugins: { legend: { display: false } } }
            });
        });
    }

    function getDummy() {
        return `날짜,Total,ETF,타이거200IT,KODEXIT,ACE 미국빅테크TOP7Plus,TIGER미국배당다우존스,KIWOOM미국양자컴퓨팅,1Q미국우주항공테크
현황,이것도 못읽냐,뭐하냐,바로 해,123456,DJFDHKFL;KDAJGALK;,| ㅁㅎㄹ마와,ㅇㅁㅇ,ㅇㅎㄴㅇㅎ
4월1일,112837440,0,1119015,965705,98180,0,0,0
4월2일,112852114,0,1119015,965705,98180,0,0,0
6월16일,114059467,9117540,6402200,1168700,99840,883400,480870,82530
6월17일,114218256,9266705,6538175,1185340,100860,875840,483600,82890`;
    }

    init();
</script>
</body>
</html>
