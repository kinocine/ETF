<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 평촌 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 bg-white shadow-lg">
        
        <header class="py-4 border-b border-slate-100 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-slate-950">
                <i class="fa-solid fa-chart-line text-indigo-600 mr-1"></i> Happy 평촌
            </h1>
            <span id="current-date" class="text-sm text-slate-500 font-medium bg-slate-100 px-2.5 py-1 rounded-full">로딩 중...</span>
        </header>

        <div class="mt-4 border-b border-slate-200 pb-3">
            <div id="tabs-container" class="flex flex-wrap gap-2">
                <span class="text-sm text-slate-400 px-3 py-1">데이터 로딩 중...</span>
            </div>
        </div>

        <main class="flex-1 flex flex-col justify-center space-y-4 my-4">
            
            <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-2xl p-6 shadow-md">
                <p id="asset-label" class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">현재 금액</p>
                <div class="flex items-baseline justify-between mb-4">
                    <span id="total-amount" class="text-3xl font-extrabold tracking-tight">0</span>
                    <span class="text-sm text-slate-400 font-medium">KRW</span>
                </div>
                
                <div class="pt-3 border-t border-slate-700/50 flex items-center justify-between">
                    <span class="text-xs text-slate-400 font-medium">전일 대비 변동</span>
                    <div class="flex items-center space-x-1.5">
                        <span id="prev-day-change" class="text-sm font-bold">-</span>
                        <span id="prev-day-icon" class="text-xs"></span>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm flex items-center justify-between">
                <div>
                    <p id="base-day-label" class="text-xs font-medium text-slate-500 mb-0.5">기준일 대비 총 증감</p>
                    <span id="base-day-change" class="text-xl font-bold">-</span>
                </div>
                <div id="base-day-badge" class="w-10 h-10 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-minus"></i>
                </div>
            </div>

            <div id="finance-links-box" class="hidden gap-2">
                <a id="naver-finance-link" href="#" target="_blank" class="bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 rounded-xl py-2.5 px-3 flex items-center justify-between font-semibold text-xs shadow-sm transition-colors w-full">
                    <span><i class="fa-solid fa-money-bill-trend-up mr-1 text-emerald-600"></i>네이버증권</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-emerald-500"></i>
                </a>
                <a id="google-finance-link" href="#" target="_blank" class="bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 rounded-xl py-2.5 px-3 flex items-center justify-between font-semibold text-xs shadow-sm transition-colors w-full">
                    <span><i class="fa-solid fa-arrow-up-right-from-square mr-1 text-blue-600"></i>구글금융</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-blue-500"></i>
                </a>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                <p class="text-xs font-semibold text-slate-500 mb-3"><i class="fa-solid fa-trend-up mr-1"></i> 자산 추이</p>
                <div class="relative w-full h-52">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="bg-amber-50/70 border border-amber-200/60 rounded-2xl p-5 shadow-sm">
                <p class="text-xs font-bold text-amber-800 uppercase tracking-wider mb-3">
                    <i class="fa-solid fa-note-sticky mr-1.5 text-amber-600"></i>투자 노트 (Note)
                </p>
                <div id="note-content-area" class="text-xs text-amber-950 space-y-2.5 max-h-40 overflow-y-auto leading-relaxed">
                    <span class="text-slate-400">메모를 불러오는 중입니다...</span>
                </div>
            </div>

        </main>

        <footer class="py-4 text-center border-t border-slate-100 text-xs text-slate-400">
            © 2026 매일 업데이트.
        </footer>
    </div>

    <script>
        // 기존 원본 로직 유지 보장 주소
        const mainSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?gid=1226081751&single=true&output=csv";
        const noteSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2EdAHai-BtLijGsrLKr_7_cOIxsh4am9N7UWW0K2ACHM8kArlVAFDAIILtUqcRysJc4mFQAFy2rLP/pub?gid=1858564295&single=true&output=csv";

        const financeKeywordMap = [
            { keyword: "IT", code: "139260" },              
            { keyword: "타이거200IT", code: "139260" },              
            { keyword: "KODEXIT", code: "266370" },         
            { keyword: "빅테크", code: "465580" },           
            { keyword: "양자", code: "498270" },             
            { keyword: "전력", code: "487240" }              
        ];

        let sheetHeaders = [];       
        let dateLabels = [];     
        let ColumnDataMaps = {}; 
        let globalNoteDatabase = []; 
        let chartInstance = null; 

        // 1. 기존에 잘 되던 원본 자산 데이터 처리 흐름 (100% 동일 복원)
        async function fetchMainAssetData() {
            try {
                const response = await fetch(mainSheetUrl);
                if (!response.ok) throw new Error("메인 데이터 응답 오류");
                const csvText = await response.text();
                
                const lines = csvText.split(/\r?\n/);
                if (lines.length < 2) return;

                // 단순 split으로 원본 로직 완벽 복구
                sheetHeaders = lines[0].split(",");
                for (let j = 1; j < sheetHeaders.length; j++) {
                    ColumnDataMaps[j] = [];
                }
                dateLabels = [];

                for (let i = 1; i < lines.length; i++) {
                    const rowText = lines[i].trim();
                    if (!rowText) continue;
                    
                    const columns = rowText.split(",");
                    if (!columns[0]) continue; 

                    dateLabels.push(columns[0]);

                    for (let j = 1; j < sheetHeaders.length; j++) {
                        let val = null;
                        if (columns[j] !== undefined && columns[j] !== null && columns[j].trim() !== "") {
                            const num = parseFloat(columns[j].replace(/[^0-9.-]/g, ""));
                            if (!isNaN(num)) val = num;
                        }
                        ColumnDataMaps[j].push(val);
                    }
                }

                renderTabs();
                switchTab(1); 

                // 자산 데이터가 다 나온 후에 Note를 별도로 독립 수신 (상단 먹통 방지 안전장치)
                fetchNoteData();

            } catch (error) {
                console.error("자산 로드 오류:", error);
                document.getElementById('current-date').innerText = "로드 실패";
            }
        }

        // 2. 노트 전용 격리 파싱 함수 (쉼표가 포함되어도 깨지지 않게 보완)
        async function fetchNoteData() {
            try {
                const response = await fetch(noteSheetUrl);
                if (!response.ok) throw new Error("노트 응답 오류");
                const csvText = await response.text();
                
                const lines = csvText.split(/\r?\n/);
                globalNoteDatabase = [];

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    // 따옴표와 쉼표를 구분하여 안전하게 분리하는 로직
                    let row = [];
                    let insideQuote = false;
                    let entry = "";
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') insideQuote = !insideQuote;
                        else if (char === ',' && !insideQuote) { row.push(entry.trim()); entry = ""; }
                        else entry += char;
                    }
                    row.push(entry.trim());

                    if (row.length < 3) continue;
                    globalNoteDatabase.push({
                        code: row[0].replace(/[^0-9]/g, ""), // 숫자만
                        date: row[1],
                        content: row[2].replace(/^"|"$/g, "") // 양끝 따옴표 제거
                    });
                }
                
                // 현재 켜져있는 탭의 노트 화면을 조용히 새로고침
                const activeTabIdx = parseFloat(document.querySelector('[id^="tab-btn-"].bg-indigo-600')?.id.replace('tab-btn-', '') || 1);
                updateNoteSection(activeTabIdx);

            } catch (error) {
                console.error("노트 처리 오류 (상단 자산은 정상 작동):", error);
                document.getElementById('note-content-area').innerHTML = `<span class="text-slate-400 italic">노트를 불러오지 못했습니다.</span>`;
            }
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = "";

            for (let j = 1; j < sheetHeaders.length; j++) {
                if (!sheetHeaders[j]) continue;
                
                const btn = document.createElement('button');
                btn.id = `tab-btn-${j}`;
                btn.type = "button";
                btn.className = "text-xs font-medium px-3 py-1.5 rounded-full whitespace-nowrap transition-all duration-150";
                btn.innerText = sheetHeaders[j];
                btn.addEventListener('click', () => switchTab(j));
                
                container.appendChild(btn);
            }
        }

        function switchTab(index) {
            const rawTabName = sheetHeaders[index] ? sheetHeaders[index].trim() : "";
            const compareName = rawTabName.replace(/\s+/g, "").toUpperCase();

            for (let j = 1; j < sheetHeaders.length; j++) {
                const btn = document.getElementById('tab-btn-' + j);
                if (!btn) continue;
                if (j === index) {
                    btn.className = "text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-indigo-600 text-white shadow-sm";
                } else {
                    btn.className = "text-xs font-medium px-3 py-1.5 rounded-full whitespace-nowrap bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }

            document.getElementById('asset-label').innerText = rawTabName + " 현황";

            // 자산 연산 수행
            const currentArray = ColumnDataMaps[index];
            let firstValidIdx = -1;
            for (let k = 0; k < currentArray.length; k++) {
                if (currentArray[k] !== null && !isNaN(currentArray[k])) { firstValidIdx = k; break; }
            }

            let latestValidIdx = -1;
            for (let k = currentArray.length - 1; k >= 0; k--) {
                if (currentArray[k] !== null && !isNaN(currentArray[k])) { latestValidIdx = k; break; }
            }

            if (firstValidIdx === -1 || latestValidIdx === -1) {
                document.getElementById('total-amount').innerText = "0";
                document.getElementById('current-date').innerText = "-";
                document.getElementById('base-day-change').innerText = "-";
                if (chartInstance) chartInstance.destroy();
                return;
            }

            document.getElementById('current-date').innerText = dateLabels[latestValidIdx];
            const latestVal = currentArray[latestValidIdx];
            
            let prevVal = latestVal;
            for (let k = latestValidIdx - 1; k >= firstValidIdx; k--) {
                if (currentArray[k] !== null && !isNaN(currentArray[k])) { prevVal = currentArray[k]; break; }
            }
            
            const baseVal = currentArray[firstValidIdx];
            const startActiveDate = dateLabels[firstValidIdx]; 

            document.getElementById('total-amount').innerText = latestVal.toLocaleString();

            const prevDiff = latestVal - prevVal;
            const prevPercent = prevVal !== 0 ? (prevDiff / prevVal) * 100 : 0;
            updatePrevDayUI(prevDiff, prevPercent);

            document.getElementById('base-day-label').innerText = "기준일(" + startActiveDate + ") 대비 총 증감";
            const baseDiff = latestVal - baseVal;
            const basePercent = baseVal !== 0 ? (baseDiff / baseVal) * 100 : 0;
            updateBaseDayCard(baseDiff, basePercent);

            renderChart(index, firstValidIdx, latestValidIdx);
            
            // 링크 박스 및 노트 화면 업데이트 연계
            updateLinkAndNoteUI(compareName, index);
        }

        // 링크 및 노트 분리 제어기
        function updateLinkAndNoteUI(compareName, index) {
            let targetCode = null;
            if (compareName.includes("KODEXIT")) {
                targetCode = "266370";
            } else {
                for (const item of financeKeywordMap) {
                    if (compareName.includes(item.keyword.toUpperCase())) { targetCode = item.code; break; }
                }
            }
            
            const linksBox = document.getElementById('finance-links-box');
            if (targetCode) {
                document.getElementById('naver-finance-link').href = "https://finance.naver.com/item/main.naver?code=" + targetCode;
                document.getElementById('google-finance-link').href = "https://www.google.com/finance/beta/quote/" + targetCode + ":KRX";
                linksBox.className = "grid grid-cols-2 gap-2";
            } else {
                linksBox.className = "hidden gap-2";
            }

            updateNoteSection(targetCode);
        }

        // 노트 화면 출력 엔진
        function updateNoteSection(targetCode) {
            const noteArea = document.getElementById('note-content-area');
            if (!noteArea) return;
            
            noteArea.innerHTML = "";
            if (!targetCode) {
                noteArea.innerHTML = `<span class="text-slate-400 italic">해당 종목에 등록된 투자 노트가 없습니다.</span>`;
                return;
            }

            const matchedNotes = globalNoteDatabase.filter(note => note.code === targetCode);

            if (matchedNotes.length > 0) {
                matchedNotes.forEach(note => {
                    const memoRow = document.createElement('div');
                    memoRow.className = "flex flex-col space-y-0.5 border-b border-amber-200/50 pb-2 last:border-0 last:pb-0";
                    memoRow.innerHTML = `
                        <span class="text-[10px] font-bold text-amber-700/80"><i class="fa-regular fa-calendar-check mr-1"></i>${note.date}</span>
                        <p class="text-amber-900 font-medium">${note.content}</p>
                    `;
                    noteArea.appendChild(memoRow);
                });
            } else {
                noteArea.innerHTML = `<span class="text-slate-400 italic">해당 종목에 등록된 투자 노트가 없습니다.</span>`;
            }
        }

        function updatePrevDayUI(diff, percent) {
            const textEl = document.getElementById('prev-day-change');
            const iconEl = document.getElementById('prev-day-icon');
            const sign = diff > 0 ? '+' : '';
            textEl.innerText = sign + diff.toLocaleString() + " (" + sign + percent.toFixed(2) + "%)";
            if (diff > 0) {
                textEl.className = "text-sm font-bold text-red-500";
                iconEl.className = "text-xs text-red-500 fa-solid fa-arrow-trend-up";
            } else if (diff < 0) {
                textEl.className = "text-sm font-bold text-blue-500";
                iconEl.className = "text-xs text-blue-500 fa-solid fa-arrow-trend-down";
            } else {
                textEl.className = "text-sm font-bold text-slate-400";
                iconEl.className = "text-xs text-slate-400 fa-solid fa-minus";
            }
        }

        function updateBaseDayCard(diff, percent) {
            const textEl = document.getElementById('base-day-change');
            const badgeEl = document.getElementById('base-day-badge');
            const sign = diff > 0 ? '+' : '';
            textEl.innerText = sign + diff.toLocaleString() + " (" + sign + percent.toFixed(2) + "%)";
            if (diff > 0) {
                textEl.className = "text-xl font-bold text-red-600";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-red-50 text-red-600";
                badgeEl.innerHTML = '<i class="fa-solid fa-arrow-trend-up"></i>';
            } else if (diff < 0) {
                textEl.className = "text-xl font-bold text-blue-600";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-blue-50 text-blue-600";
                badgeEl.innerHTML = '<i class="fa-solid fa-arrow-trend-down"></i>';
            } else {
                textEl.className = "text-xl font-bold text-slate-500";
                badgeEl.className = "w-10 h-10 rounded-full flex items-center justify-center text-lg bg-slate-100 text-slate-500";
                badgeEl.innerHTML = '<i class="fa-solid fa-minus"></i>';
            }
        }

        function renderChart(index, startIndex, endIndex) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            const filteredLabels = dateLabels.slice(startIndex, endIndex + 1);
            const filteredData = ColumnDataMaps[index].slice(startIndex, endIndex + 1);
            
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredLabels,
                    datasets: [{
                        label: sheetHeaders[index],
                        data: filteredData,
                        borderColor: '#4f46e5',
                        borderWidth: 2.5,
                        pointRadius: 2,
                        pointHoverRadius: 5,
                        fill: false,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8', maxTicksLimit: 8 } },
                        y: {
                            grid: { color: '#f1f5f9' },
                            ticks: {
                                font: { size: 9 },
                                color: '#94a3b8',
                                callback: function(value) {
                                    return value >= 10000 ? (value / 10000).toLocaleString() + '만' : value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        // 구동 방식 전면 교체 (메인 에셋 데이터 먼저 확실하게 출력)
        window.onload = fetchMainAssetData;
    </script>
</body>
</html>
